<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Brain Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .chat-bubble-ai { background-color: #1e293b; border-left: 4px solid #38bdf8; }
        .chat-bubble-user { background-color: #334155; border-right: 4px solid #94a3b8; }
        .system-tip { font-size: 0.75rem; color: #64748b; text-align: center; margin: 10px 0; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="w-3/5 flex flex-col border-r border-slate-800">
        <div class="px-6 pt-4">
            <a href="/map" class="text-sky-400 hover:text-sky-300 text-sm mb-4 inline-block"> ← 返回成长地图 </a>
        </div>
        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="chat-bubble-ai p-4 rounded-lg shadow">
                你好！我是你的思维 Agent。我已经准备好记录你的新想法了。
            </div>
        </div>
        
        <div class="p-4 bg-slate-900 border-t border-slate-800">
            <div class="flex flex-col gap-2">
                <textarea id="user-input" 
                       placeholder="输入问题... (Enter 发送, Shift+Enter 换行)" 
                       class="w-full bg-slate-800 border-none rounded-lg p-3 focus:ring-2 focus:ring-sky-500 outline-none resize-none"
                       rows="3"
                       onkeydown="handleKeyDown(event)"></textarea>
                <div class="flex justify-between items-center px-1">
                    <span class="text-xs text-slate-500">按 Enter 发送 / Shift+Enter 换行</span>
                    <button onclick="sendMessage()" class="bg-sky-600 hover:bg-sky-500 px-6 py-2 rounded-lg transition font-medium">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div class="w-2/5 flex flex-col bg-slate-900/50">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-xl font-bold">学习时间轴</h2>
            <button onclick="toggleModal()" class="text-sm bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded transition font-medium">+ 添加记录</button>
        </div>
        <div class="p-4 border-b border-slate-800 space-y-2">
            <input id="upload-title" type="text" placeholder="文章标题" class="w-full bg-slate-800 border-none rounded-lg p-2 focus:ring-2 focus:ring-sky-500 outline-none">
            <textarea id="upload-content" placeholder="粘贴文章内容" class="w-full bg-slate-800 border-none rounded-lg p-2 h-28 focus:ring-2 focus:ring-sky-500 outline-none resize-none"></textarea>
            <input id="upload-pdf-file" type="file" accept=".pdf,application/pdf" onchange="onPdfFileChange(event)" class="w-full text-xs text-slate-300 file:mr-3 file:px-3 file:py-1.5 file:rounded file:border-0 file:bg-slate-700 file:text-slate-100 hover:file:bg-slate-600">
            <div id="upload-pdf-meta" class="text-xs text-slate-500"></div>
            <div class="flex items-center justify-between">
                <div class="flex gap-2">
                    <button onclick="uploadDocument()" class="bg-violet-600 hover:bg-violet-500 px-4 py-2 rounded-lg transition font-medium text-sm">上传文本</button>
                    <button onclick="uploadPdfDocument()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg transition font-medium text-sm">上传 PDF</button>
                </div>
                <span id="upload-feedback" class="text-xs text-slate-400"></span>
            </div>
            <div id="upload-progress-wrap" class="hidden">
                <div class="w-full h-2 bg-slate-700 rounded overflow-hidden">
                    <div id="upload-progress-bar" class="h-2 bg-sky-500 w-0 transition-all"></div>
                </div>
                <div id="upload-progress-text" class="text-xs text-slate-400 mt-1">0%</div>
            </div>
        </div>
        <div id="timeline" class="flex-1 overflow-y-auto p-6 space-y-6">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-md shadow-2xl border border-slate-700">
            <h3 class="text-lg font-bold mb-4">记录新想法</h3>
            <div class="space-y-3">
                <input id="new-date" type="text" placeholder="日期 (如 3/18)" class="w-full bg-slate-700 p-2 rounded outline-none focus:ring-1 focus:ring-sky-500">
                <input id="new-title" type="text" placeholder="标题" class="w-full bg-slate-700 p-2 rounded outline-none focus:ring-1 focus:ring-sky-500">
                <textarea id="new-content" placeholder="内容" class="w-full bg-slate-700 p-2 rounded h-32 outline-none focus:ring-1 focus:ring-sky-500"></textarea>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="saveRecord()" class="flex-1 bg-sky-600 py-2 rounded font-bold hover:bg-sky-500 transition">保存记录</button>
                <button onclick="toggleModal()" class="flex-1 bg-slate-600 py-2 rounded hover:bg-slate-500 transition">取消</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 对话逻辑 ---

        // 处理回车发送逻辑
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // 阻止 textarea 默认的换行行为
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const query = input.value.trim();
            if(!query) return;

            appendMsg(query, 'user');
            input.value = '';

            try {
                await streamChat(query, true);
            } catch (err) {
                console.error("发送失败:", err);
                appendMsg('请求失败，请稍后重试。', 'ai');
            }
        }

        // --- 2. 时间轴逻辑 ---

        async function loadTimeline() {
            try {
                const res = await fetch('/timeline');
                const data = await res.json();
                const container = document.getElementById('timeline');
                container.innerHTML = '';
                
                // 这里的 data 已经包含后端处理好的 original_idx
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'group border-l-2 border-slate-700 pl-4 relative mb-6';
                    div.innerHTML = `
                        <div class="absolute w-3 h-3 bg-sky-500 rounded-full -left-[7.5px] top-1"></div>
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-xs text-slate-500">${item.date}</div>
                                <div class="font-semibold text-sky-400">${item.title}</div>
                            </div>
                            <button onclick="deleteRecord(${item.original_idx})" 
                                    class="opacity-0 group-hover:opacity-100 text-xs text-red-500 hover:text-red-400 transition p-1">
                                [删除]
                            </button>
                        </div>
                        <div class="text-sm text-slate-400 mt-1 leading-relaxed">${item.content}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error("加载时间轴失败:", err);
            }
        }

        async function deleteRecord(originalIdx) {
            if(!confirm("确定要删除这条记忆吗？")) return;
            
            await fetch('/record', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({index: originalIdx})
            });
            loadTimeline();
        }

        // --- 3. 记录添加与静默更新 ---

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        async function saveRecord() {
            const date = document.getElementById('new-date').value;
            const title = document.getElementById('new-title').value;
            const content = document.getElementById('new-content').value;

            if(!date || !title || !content) {
                alert("请填全所有字段");
                return;
            }

            // A. 添加新记录
            await fetch('/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({date, title, content})
            });
            
            toggleModal();
            loadTimeline();
            
            // B. 清空表单
            document.getElementById('new-date').value = '';
            document.getElementById('new-title').value = '';
            document.getElementById('new-content').value = '';

            // C. 静默通知 Agent 知识库已更新
            appendSystemTip("正在同步 Agent 认知...");
            await streamChat("用户刚刚添加了一条新记录，请重新检索知识库确认", false);
            appendMsg("Agent 已感知到新纪录，知识库同步完成。", 'ai');
        }

        async function uploadDocument() {
            const titleInput = document.getElementById('upload-title');
            const contentInput = document.getElementById('upload-content');
            const feedback = document.getElementById('upload-feedback');
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title || !content) {
                feedback.innerText = '请填写标题和内容';
                return;
            }

            feedback.innerText = '上传中...';
            try {
                const { ok, data } = await uploadWithProgress('/upload', JSON.stringify({ title, content }), {'Content-Type': 'application/json'});
                if (!ok) {
                    throw new Error(data.error || '上传失败');
                }
                feedback.innerText = `已切分为 ${data.chunks} 个片段`;
                titleInput.value = '';
                contentInput.value = '';
            } catch (err) {
                feedback.innerText = formatUploadError(err);
            }
        }

        async function uploadPdfDocument() {
            const titleInput = document.getElementById('upload-title');
            const fileInput = document.getElementById('upload-pdf-file');
            const feedback = document.getElementById('upload-feedback');
            const file = fileInput.files && fileInput.files[0];
            if (!file) {
                feedback.innerText = '请选择 PDF 文件';
                return;
            }
            const formData = new FormData();
            const title = titleInput.value.trim();
            if (title) {
                formData.append('title', title);
            }
            formData.append('file', file);
            feedback.innerText = '上传中...';
            try {
                const { ok, data } = await uploadWithProgress('/upload', formData);
                if (!ok) {
                    throw new Error(data.error || '上传失败');
                }
                feedback.innerText = `已切分为 ${data.chunks} 个片段`;
                fileInput.value = '';
                titleInput.value = '';
                document.getElementById('upload-pdf-meta').innerText = '';
            } catch (err) {
                feedback.innerText = formatUploadError(err);
            }
        }

        function onPdfFileChange(event) {
            const file = event.target.files && event.target.files[0];
            const meta = document.getElementById('upload-pdf-meta');
            if (!file) {
                meta.innerText = '';
                return;
            }
            meta.innerText = `已选择：${file.name}（${formatFileSize(file.size)}）`;
        }

        function formatFileSize(bytes) {
            if (!bytes && bytes !== 0) return '';
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
        }

        async function parseUploadResponse(res) {
            const raw = await res.text();
            try {
                return JSON.parse(raw);
            } catch (_) {
                return { error: raw || `HTTP ${res.status}` };
            }
        }

        function parseUploadResponseText(raw, status) {
            try {
                return JSON.parse(raw);
            } catch (_) {
                return { error: raw || `HTTP ${status}` };
            }
        }

        function setUploadProgress(percent) {
            const value = Math.max(0, Math.min(100, Math.round(percent)));
            document.getElementById('upload-progress-bar').style.width = `${value}%`;
            document.getElementById('upload-progress-text').innerText = `${value}%`;
        }

        function showUploadProgress() {
            document.getElementById('upload-progress-wrap').classList.remove('hidden');
            setUploadProgress(0);
        }

        function hideUploadProgress() {
            setTimeout(() => {
                document.getElementById('upload-progress-wrap').classList.add('hidden');
            }, 600);
        }

        function uploadWithProgress(url, payload, headers = {}) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);
                Object.entries(headers).forEach(([k, v]) => xhr.setRequestHeader(k, v));
                showUploadProgress();
                xhr.upload.onprogress = (evt) => {
                    if (evt.lengthComputable) {
                        setUploadProgress((evt.loaded / evt.total) * 100);
                    }
                };
                xhr.onload = () => {
                    setUploadProgress(100);
                    hideUploadProgress();
                    resolve({
                        ok: xhr.status >= 200 && xhr.status < 300,
                        status: xhr.status,
                        data: parseUploadResponseText(xhr.responseText, xhr.status)
                    });
                };
                xhr.onerror = () => {
                    hideUploadProgress();
                    reject(new TypeError('Failed to fetch'));
                };
                xhr.send(payload);
            });
        }

        function formatUploadError(err) {
            if (err instanceof TypeError && String(err.message).includes('Failed to fetch')) {
                return '上传失败：无法连接后端。请确认 Flask 服务已启动（python app.py），并检查后端是否因依赖报错退出。';
            }
            return `上传失败：${err.message}`;
        }

        // UI 辅助函数
        async function streamChat(query, renderToChat = true) {
            const res = await fetch('/chat_stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query})
            });
            if (!res.ok || !res.body) {
                throw new Error(`HTTP ${res.status}`);
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            let aiDiv = null;

            if (renderToChat) {
                aiDiv = appendMsg('', 'ai', true);
            }

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split('\n\n');
                buffer = events.pop() || '';

                for (const evt of events) {
                    const lines = evt.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') {
                            continue;
                        }
                        if (renderToChat && aiDiv) {
                            aiDiv.innerText += data;
                            const win = document.getElementById('chat-window');
                            win.scrollTop = win.scrollHeight;
                        }
                    }
                }
            }
        }

        function appendMsg(text, role) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = role === 'user' ? 
                'chat-bubble-user p-4 rounded-lg ml-auto max-w-[85%] shadow-md mb-4' : 
                'chat-bubble-ai p-4 rounded-lg mr-auto max-w-[85%] shadow-md mb-4';
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            return div;
        }

        function appendSystemTip(text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'system-tip';
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        // 页面启动时加载数据
        window.onload = loadTimeline;
    </script>
</body>
</html>
