<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 学习工作台</title>
    <link rel="stylesheet" href="/static/css/design-tokens.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .app-shell {
            height: 100vh;
            display: grid;
            grid-template-columns: 1.7fr 1fr;
            gap: var(--space-16);
            padding: var(--space-16);
        }
        .panel {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform var(--motion-normal) var(--ease-standard), box-shadow var(--motion-normal) var(--ease-standard);
        }
        .panel:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-medium);
        }
        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-16);
            border-bottom: 1px solid var(--color-border);
            background: #ffffffb3;
            backdrop-filter: blur(6px);
        }
        .panel-title {
            margin: 0;
            font-size: var(--font-h4);
            font-weight: 700;
        }
        .mini-link {
            color: var(--color-brand-600);
            text-decoration: none;
            font-size: var(--font-caption);
            font-weight: 600;
        }
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-16);
            display: flex;
            flex-direction: column;
            gap: var(--space-12);
            background: linear-gradient(180deg, #ffffff, #f8fafc);
        }
        .chat-row {
            display: flex;
        }
        .chat-row.ai { justify-content: flex-start; }
        .chat-row.user { justify-content: flex-end; }
        .bubble {
            max-width: 82%;
            border-radius: var(--radius-md);
            padding: var(--space-12);
            line-height: 1.5;
            font-size: var(--font-body);
            box-shadow: var(--shadow-light);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .bubble-ai {
            background: #e5e7eb;
            color: #1f2937;
        }
        .bubble-user {
            background: linear-gradient(135deg, var(--color-brand-500), var(--color-brand-700));
            color: #fff;
        }
        .system-tip {
            text-align: center;
            color: var(--color-text-muted);
            font-size: var(--font-caption);
            padding: 4px 0;
        }
        .composer {
            border-top: 1px solid var(--color-border);
            padding: var(--space-16);
            display: flex;
            flex-direction: column;
            gap: var(--space-12);
            background: #fff;
        }
        textarea, input[type="text"] {
            width: 100%;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: #fff;
            padding: 12px;
            font-size: var(--font-body);
            outline: none;
            transition: border-color var(--motion-fast) var(--ease-standard), box-shadow var(--motion-fast) var(--ease-standard);
        }
        textarea:focus, input[type="text"]:focus {
            border-color: var(--color-brand-500);
            box-shadow: 0 0 0 3px #a78bfa3b;
        }
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-12);
        }
        .tiny {
            font-size: var(--font-caption);
            color: var(--color-text-muted);
        }
        .btn {
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: var(--font-body);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease-in-out;
            border: 1px solid transparent;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.2);
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }
        .btn-tier-1 { background: #EFF6FF; border-color: #3B82F6; color: #1D4ED8; }
        .btn-tier-1:hover { background: #DBEAFE; }
        .btn-tier-2 { background: #FEF9C3; border-color: #FBBF24; color: #92400E; }
        .btn-tier-2:hover { background: #FDE68A; }
        .btn-tier-3 { background: #DBEAFE; border-color: #93C5FD; color: #1E40AF; }
        .btn-tier-3:hover { background: #BFDBFE; }
        .btn-tier-4 { background: #FFF7ED; border-color: #FCD34D; color: #B45309; }
        .btn-tier-4:hover { background: #FFEDD5; }
        .upload-box {
            padding: var(--space-16);
            border-bottom: 1px solid var(--color-border);
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }
        .file-input {
            width: 100%;
            border: 1px dashed var(--color-border);
            border-radius: var(--radius-md);
            padding: 8px;
            background: #fff;
            font-size: var(--font-caption);
        }
        .progress-wrap {
            display: none;
            margin-top: 8px;
        }
        .progress-track {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: var(--radius-full);
            background: linear-gradient(90deg, var(--color-brand-500), var(--color-accent));
            transition: width var(--motion-normal) var(--ease-standard);
        }
        .timeline-wrap {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-16);
        }
        .timeline {
            position: relative;
            padding-left: 24px;
        }
        .timeline::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 8px;
            width: 2px;
            background: #d1d5db;
        }
        .timeline-item {
            position: relative;
            margin-bottom: var(--space-16);
            padding: 12px 12px 12px 14px;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-light);
            transition: transform var(--motion-normal) var(--ease-standard), box-shadow var(--motion-normal) var(--ease-standard), opacity var(--motion-normal) var(--ease-standard);
        }
        .timeline-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-medium);
        }
        .timeline-item::before {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: var(--radius-full);
            left: -22px;
            top: 18px;
            border: 2px solid #fff;
        }
        .status-completed::before { background: #22c55e; }
        .status-progress::before { background: #3b82f6; }
        .status-pending::before { background: #9ca3af; }
        .status-tag {
            display: inline-block;
            border-radius: var(--radius-full);
            padding: 2px 10px;
            font-size: var(--font-caption);
            margin-bottom: 6px;
        }
        .status-completed .status-tag { background: #dcfce7; color: #166534; }
        .status-progress .status-tag { background: #dbeafe; color: #1e40af; }
        .status-pending .status-tag { background: #f3f4f6; color: #374151; }
        .timeline-title {
            font-size: var(--font-body);
            font-weight: 700;
            margin: 4px 0;
        }
        .timeline-date {
            color: var(--color-text-muted);
            font-size: var(--font-caption);
        }
        .timeline-content {
            color: #374151;
            font-size: var(--font-body);
            margin-top: 4px;
            line-height: 1.55;
        }
        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            font-size: var(--font-caption);
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--motion-fast) var(--ease-standard);
        }
        .timeline-item:hover .delete-btn { opacity: 1; }
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp var(--motion-slow) var(--ease-standard) forwards;
        }
        .stream-bubble {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            position: relative;
            min-height: 56px;
        }
        .stream-skeleton {
            height: 20px;
            border-radius: var(--radius-full);
            background: linear-gradient(90deg, #dbeafe, #bfdbfe, #dbeafe);
            background-size: 220% 100%;
            animation: skeletonMove 1.2s linear infinite;
        }
        .stream-text {
            display: inline;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .stream-cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: var(--color-brand-500);
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: cursorBlink 1s infinite;
        }
        .stream-actions {
            margin-top: 10px;
            display: none;
            gap: 8px;
            justify-content: flex-end;
        }
        .stream-actions.show { display: flex; }
        .stream-mini-btn {
            border: 1px solid var(--color-border);
            background: #fff;
            color: var(--color-text-muted);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease-in-out;
        }
        .stream-mini-btn:hover {
            color: var(--color-brand-600);
            border-color: var(--color-brand-200);
            background: var(--color-brand-light);
        }
        [data-tooltip] {
            position: relative;
        }
        [data-tooltip]::before,
        [data-tooltip]::after {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1200;
        }
        [data-tooltip]::before {
            content: attr(data-tooltip);
            background: #1A1A2E;
            color: #fff;
            font-size: 13px;
            border-radius: 8px;
            padding: 6px 12px;
            white-space: nowrap;
            left: 50%;
            transform: translate(-50%, 4px);
            bottom: calc(100% + 10px);
        }
        [data-tooltip]::after {
            content: "";
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid #1A1A2E;
            left: 50%;
            transform: translate(-50%, 4px);
            bottom: calc(100% + 4px);
        }
        [data-tooltip][data-tooltip-pos="bottom"]::before {
            bottom: auto;
            top: calc(100% + 10px);
            transform: translate(-50%, -4px);
        }
        [data-tooltip][data-tooltip-pos="bottom"]::after {
            bottom: auto;
            top: calc(100% + 4px);
            border-top: none;
            border-bottom: 6px solid #1A1A2E;
            transform: translate(-50%, -4px);
        }
        [data-tooltip].tooltip-visible::before,
        [data-tooltip].tooltip-visible::after {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        @keyframes skeletonMove {
            from { background-position: 100% 0; }
            to { background-position: -100% 0; }
        }
        @keyframes cursorBlink {
            0%, 45% { opacity: 1; }
            55%, 100% { opacity: 0; }
        }
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal {
            position: fixed;
            inset: 0;
            background: #0f172a75;
            display: none;
            align-items: center;
            justify-content: center;
            padding: var(--space-16);
            z-index: 50;
        }
        .modal.show { display: flex; }
        .modal-card {
            width: min(520px, 100%);
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-heavy);
            padding: var(--space-24);
        }
        .modal-actions {
            margin-top: var(--space-16);
            display: flex;
            gap: var(--space-12);
        }
        @media (max-width: 1024px) {
            .app-shell {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
            }
            .panel { min-height: 72vh; }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <section class="panel fade-in" style="animation-delay: .05s">
            <header class="panel-head">
                <div>
                    <h2 class="panel-title">学习对话</h2>
                    <div class="tiny">记录、追问、总结都在这里完成</div>
                </div>
                <a href="/map" class="mini-link">返回成长地图</a>
            </header>
            <div id="chat-window" class="chat-window">
                <div class="chat-row ai">
                    <div class="bubble bubble-ai">你好！我是你的学习 Agent，今天想先复盘哪个模块？</div>
                </div>
            </div>
            <div class="composer">
                <textarea id="user-input" rows="3" placeholder="输入问题... (Enter 发送, Shift+Enter 换行)" onkeydown="handleKeyDown(event)"></textarea>
                <div class="action-row">
                    <span class="tiny">按 Enter 发送 / Shift+Enter 换行</span>
                    <button id="send-message-btn" onclick="sendMessage()" class="btn" data-tooltip="发送当前问题">发送</button>
                </div>
            </div>
        </section>

        <aside class="panel fade-in" style="animation-delay: .12s">
            <header class="panel-head">
                <h2 class="panel-title">学习时间轴</h2>
                <button onclick="toggleModal()" class="btn" data-tooltip="新增学习记录">+ 添加记录</button>
            </header>
            <section class="upload-box">
                <input id="upload-title" type="text" placeholder="文章标题">
                <textarea id="upload-content" placeholder="粘贴文章内容" rows="4"></textarea>
                <input id="upload-pdf-file" class="file-input" type="file" accept=".pdf,application/pdf" onchange="onPdfFileChange(event)">
                <div id="upload-pdf-meta" class="tiny"></div>
                <div class="action-row">
                    <div style="display:flex; gap:8px;">
                        <button onclick="uploadDocument()" class="btn" data-tooltip="上传文本资料">上传文本</button>
                        <button onclick="uploadPdfDocument()" class="btn" data-tooltip="上传PDF资料">上传 PDF</button>
                    </div>
                    <span id="upload-feedback" class="tiny"></span>
                </div>
                <div id="upload-progress-wrap" class="progress-wrap">
                    <div class="progress-track">
                        <div id="upload-progress-bar" class="progress-bar"></div>
                    </div>
                    <div id="upload-progress-text" class="tiny" style="margin-top:6px;">0%</div>
                </div>
            </section>
            <section class="timeline-wrap">
                <div id="timeline" class="timeline"></div>
            </section>
        </aside>
    </main>

    <div id="modal" class="modal">
        <div class="modal-card fade-in">
            <h3 style="margin:0 0 12px 0; font-size:var(--font-h4)">记录新想法</h3>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <input id="new-date" type="text" placeholder="日期 (如 3/18)">
                <input id="new-title" type="text" placeholder="标题">
                <textarea id="new-content" rows="5" placeholder="内容"></textarea>
            </div>
            <div class="modal-actions">
                <button onclick="saveRecord()" class="btn" style="flex:1" data-tooltip="保存这条记录">保存记录</button>
                <button onclick="toggleModal()" class="btn" style="flex:1" data-tooltip="关闭弹窗">取消</button>
            </div>
        </div>
    </div>

    <script>
        let lastUserQuery = '';
        const buttonTierCycle = ['btn-tier-1', 'btn-tier-2', 'btn-tier-3', 'btn-tier-4'];

        function applyButtonTierCycle() {
            const btns = Array.from(document.querySelectorAll('button.btn'));
            btns.forEach((btn, idx) => {
                buttonTierCycle.forEach((tier) => btn.classList.remove(tier));
                btn.classList.add(buttonTierCycle[idx % buttonTierCycle.length]);
            });
        }

        function initTooltips() {
            const all = document.querySelectorAll('[data-tooltip]');
            all.forEach((el) => {
                let timer = null;
                const show = () => {
                    const rect = el.getBoundingClientRect();
                    const nearTop = rect.top < 64;
                    const nearRight = rect.right > window.innerWidth - 20;
                    const nearLeft = rect.left < 20;
                    el.setAttribute('data-tooltip-pos', nearTop || nearRight || nearLeft ? 'bottom' : 'top');
                    timer = setTimeout(() => {
                        el.classList.add('tooltip-visible');
                    }, 300);
                };
                const hide = () => {
                    clearTimeout(timer);
                    el.classList.remove('tooltip-visible');
                };
                el.addEventListener('mouseenter', show);
                el.addEventListener('mouseleave', hide);
                el.addEventListener('blur', hide);
            });
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function timelineState(index) {
            if (index === 0) return { cls: 'status-progress', text: '进行中' };
            if (index <= 2) return { cls: 'status-completed', text: '已完成' };
            return { cls: 'status-pending', text: '待开始' };
        }

        async function sendMessage() {
            const sendBtn = document.getElementById('send-message-btn');
            const input = document.getElementById('user-input');
            const query = input.value.trim();
            if (!query) return;
            lastUserQuery = query;
            appendMsg(query, 'user');
            input.value = '';
            sendBtn.disabled = true;
            sendBtn.innerText = '生成中...';
            try {
                await streamChat(query, true);
            } catch (err) {
                appendMsg('请求失败，请稍后重试。', 'ai');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = '发送';
            }
        }

        async function loadTimeline() {
            try {
                const res = await fetch('/timeline');
                const data = await res.json();
                const container = document.getElementById('timeline');
                container.innerHTML = '';
                data.forEach((item, index) => {
                    const state = timelineState(index);
                    const div = document.createElement('article');
                    div.className = `timeline-item ${state.cls}`;
                    div.innerHTML = `
                        <span class="status-tag">${state.text}</span>
                        <div class="timeline-date">${escapeHtml(item.date || '')}</div>
                        <div class="timeline-title">${escapeHtml(item.title || '')}</div>
                        <div class="timeline-content">${escapeHtml(item.content || '')}</div>
                        <button class="delete-btn" onclick="deleteRecord(${item.original_idx})">删除</button>
                    `;
                    container.appendChild(div);
                });
                bindRevealMotion();
            } catch (err) {}
        }

        async function deleteRecord(originalIdx) {
            if (!confirm("确定要删除这条记录吗？")) return;
            await fetch('/record', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({index: originalIdx})
            });
            loadTimeline();
        }

        function toggleModal() {
            document.getElementById('modal').classList.toggle('show');
        }

        async function saveRecord() {
            const date = document.getElementById('new-date').value.trim();
            const title = document.getElementById('new-title').value.trim();
            const content = document.getElementById('new-content').value.trim();
            if (!date || !title || !content) {
                alert("请填全所有字段");
                return;
            }
            await fetch('/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({date, title, content})
            });
            toggleModal();
            loadTimeline();
            document.getElementById('new-date').value = '';
            document.getElementById('new-title').value = '';
            document.getElementById('new-content').value = '';
            appendSystemTip("正在同步 Agent 认知...");
            await streamChat("用户刚刚添加了一条新记录，请重新检索知识库确认", false);
            appendMsg("Agent 已感知到新记录，知识库同步完成。", 'ai');
        }

        async function uploadDocument() {
            const titleInput = document.getElementById('upload-title');
            const contentInput = document.getElementById('upload-content');
            const feedback = document.getElementById('upload-feedback');
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            if (!title || !content) {
                feedback.innerText = '请填写标题和内容';
                return;
            }
            feedback.innerText = '上传中...';
            try {
                const { ok, data } = await uploadWithProgress('/upload', JSON.stringify({ title, content }), {'Content-Type': 'application/json'});
                if (!ok) throw new Error(data.error || '上传失败');
                feedback.innerText = `已切分 ${data.chunks} 段`;
                titleInput.value = '';
                contentInput.value = '';
            } catch (err) {
                feedback.innerText = formatUploadError(err);
            }
        }

        async function uploadPdfDocument() {
            const titleInput = document.getElementById('upload-title');
            const fileInput = document.getElementById('upload-pdf-file');
            const feedback = document.getElementById('upload-feedback');
            const file = fileInput.files && fileInput.files[0];
            if (!file) {
                feedback.innerText = '请选择 PDF 文件';
                return;
            }
            const formData = new FormData();
            const title = titleInput.value.trim();
            if (title) formData.append('title', title);
            formData.append('file', file);
            feedback.innerText = '上传中...';
            try {
                const { ok, data } = await uploadWithProgress('/upload', formData);
                if (!ok) throw new Error(data.error || '上传失败');
                feedback.innerText = `已切分 ${data.chunks} 段`;
                fileInput.value = '';
                titleInput.value = '';
                document.getElementById('upload-pdf-meta').innerText = '';
            } catch (err) {
                feedback.innerText = formatUploadError(err);
            }
        }

        function onPdfFileChange(event) {
            const file = event.target.files && event.target.files[0];
            const meta = document.getElementById('upload-pdf-meta');
            meta.innerText = file ? `已选择：${file.name}（${formatFileSize(file.size)}）` : '';
        }

        function formatFileSize(bytes) {
            if (!bytes && bytes !== 0) return '';
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
        }

        function parseUploadResponseText(raw, status) {
            try {
                return JSON.parse(raw);
            } catch (_) {
                return { error: raw || `HTTP ${status}` };
            }
        }

        function setUploadProgress(percent) {
            const value = Math.max(0, Math.min(100, Math.round(percent)));
            document.getElementById('upload-progress-bar').style.width = `${value}%`;
            document.getElementById('upload-progress-text').innerText = `${value}%`;
        }

        function showUploadProgress() {
            document.getElementById('upload-progress-wrap').style.display = 'block';
            setUploadProgress(0);
        }

        function hideUploadProgress() {
            setTimeout(() => {
                document.getElementById('upload-progress-wrap').style.display = 'none';
            }, 600);
        }

        function uploadWithProgress(url, payload, headers = {}) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);
                Object.entries(headers).forEach(([k, v]) => xhr.setRequestHeader(k, v));
                showUploadProgress();
                xhr.upload.onprogress = (evt) => {
                    if (evt.lengthComputable) setUploadProgress((evt.loaded / evt.total) * 100);
                };
                xhr.onload = () => {
                    setUploadProgress(100);
                    hideUploadProgress();
                    resolve({
                        ok: xhr.status >= 200 && xhr.status < 300,
                        status: xhr.status,
                        data: parseUploadResponseText(xhr.responseText, xhr.status)
                    });
                };
                xhr.onerror = () => {
                    hideUploadProgress();
                    reject(new TypeError('Failed to fetch'));
                };
                xhr.send(payload);
            });
        }

        function formatUploadError(err) {
            if (err instanceof TypeError && String(err.message).includes('Failed to fetch')) {
                return '上传失败：无法连接后端，请确认 Flask 服务已启动。';
            }
            return `上传失败：${err.message}`;
        }

        async function streamChat(query, renderToChat = true) {
            const res = await fetch('/chat_stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query})
            });
            if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);
            const reader = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            let aiDiv = null;
            let streamTextEl = null;
            let streamSkeletonEl = null;
            let streamCursorEl = null;
            let streamActionsEl = null;
            let seenText = false;
            if (renderToChat) {
                aiDiv = appendMsg('', 'ai');
                aiDiv.classList.add('stream-bubble');
                aiDiv.innerHTML = `
                    <div class="stream-skeleton"></div>
                    <span class="stream-text"></span><span class="stream-cursor"></span>
                    <div class="stream-actions">
                        <button class="stream-mini-btn">复制</button>
                        <button class="stream-mini-btn">重新生成</button>
                    </div>
                `;
                streamTextEl = aiDiv.querySelector('.stream-text');
                streamSkeletonEl = aiDiv.querySelector('.stream-skeleton');
                streamCursorEl = aiDiv.querySelector('.stream-cursor');
                streamActionsEl = aiDiv.querySelector('.stream-actions');
            }
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split('\n\n');
                buffer = events.pop() || '';
                for (const evt of events) {
                    const lines = evt.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        if (renderToChat && aiDiv && streamTextEl) {
                            if (!seenText) {
                                seenText = true;
                                if (streamSkeletonEl) {
                                    streamSkeletonEl.style.display = 'none';
                                }
                            }
                            streamTextEl.innerText += data;
                            const win = document.getElementById('chat-window');
                            win.scrollTop = win.scrollHeight;
                        }
                    }
                }
            }
            if (renderToChat && aiDiv) {
                const copyBtn = aiDiv.querySelector('.stream-mini-btn:nth-child(1)');
                const regenBtn = aiDiv.querySelector('.stream-mini-btn:nth-child(2)');
                if (streamCursorEl) streamCursorEl.style.display = 'none';
                if (streamActionsEl) streamActionsEl.classList.add('show');
                if (copyBtn && streamTextEl) {
                    copyBtn.addEventListener('click', async () => {
                        try {
                            await navigator.clipboard.writeText(streamTextEl.innerText);
                            copyBtn.innerText = '已复制';
                            setTimeout(() => copyBtn.innerText = '复制', 1200);
                        } catch (_) {}
                    });
                }
                if (regenBtn) {
                    regenBtn.addEventListener('click', async () => {
                        if (!lastUserQuery) return;
                        await streamChat(lastUserQuery, true);
                    });
                }
            }
        }

        function appendMsg(text, role) {
            const win = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.className = `chat-row ${role === 'user' ? 'user' : 'ai'}`;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role === 'user' ? 'bubble-user' : 'bubble-ai'}`;
            bubble.innerText = text;
            row.appendChild(bubble);
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
            return bubble;
        }

        function appendSystemTip(text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'system-tip';
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function bindRevealMotion() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('fade-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.timeline-item').forEach((el) => observer.observe(el));
        }

        window.onload = loadTimeline;
        applyButtonTierCycle();
        initTooltips();
    </script>
</body>
</html>
