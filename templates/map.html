<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路径详情</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #F8FAFC;
            color: #0F172A;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            height: 64px;
            background: #FFFFFF;
            border-bottom: 1px solid #E2E8F0;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            padding: 0 18px;
        }
        .back-link {
            justify-self: start;
            color: #1D4ED8;
            font-weight: 600;
            text-decoration: none;
        }
        .path-title {
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }
        .progress-pill {
            justify-self: end;
            background: linear-gradient(90deg, #3B82F6, #1D4ED8);
            color: #FFFFFF;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
        }
        #graph-wrap {
            position: fixed;
            inset: 64px 0 64px 0;
        }
        #graph {
            width: 100%;
            height: 100%;
        }
        .node-circle {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .node-label {
            font-size: 12px;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }
        .node-badge {
            font-size: 14px;
            pointer-events: none;
        }
        .node-center-icon {
            font-size: 18px;
            pointer-events: none;
        }
        .learning-pulse {
            transform-origin: center;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { stroke-width: 2; }
            50% { stroke-width: 6; }
            100% { stroke-width: 2; }
        }
        #tooltip {
            position: fixed;
            pointer-events: none;
            background: #0F172A;
            color: #FFFFFF;
            font-size: 12px;
            border-radius: 8px;
            padding: 7px 10px;
            opacity: 0;
            z-index: 30;
            transition: opacity 0.12s ease;
        }
        #drawer-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.28);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 24;
        }
        #drawer-mask.show {
            opacity: 1;
            pointer-events: auto;
        }
        #drawer {
            position: fixed;
            top: 64px;
            right: -320px;
            width: 320px;
            height: calc(100vh - 128px);
            background: #FFFFFF;
            border-left: 1px solid #E2E8F0;
            padding: 18px 16px;
            transition: right 0.3s ease;
            z-index: 25;
            overflow-y: auto;
        }
        #drawer.show { right: 0; }
        .drawer-title {
            margin: 0 0 8px;
            font-size: 24px;
            font-weight: 800;
        }
        .chips { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .chip {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
            background: #EFF6FF;
            color: #1D4ED8;
        }
        .desc {
            color: #334155;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 14px;
        }
        .sub-title {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 6px;
        }
        .prereq-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 13px;
            margin-bottom: 6px;
            background: #F8FAFC;
        }
        .btn {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            margin-top: 10px;
        }
        .btn-blue {
            background: #3B82F6;
            color: #FFFFFF;
        }
        .btn-yellow {
            background: #FBBF24;
            color: #1F2937;
        }
        .bottom-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 64px;
            border-top: 1px solid #E2E8F0;
            background: #FFFFFF;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            padding: 0 12px;
            z-index: 23;
        }
        .bottom-btn {
            height: 42px;
            border-radius: 999px;
            padding: 0 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }
        .bottom-btn.yellow {
            background: #FBBF24;
            color: #1F2937;
        }
        .bottom-btn.blue {
            background: #3B82F6;
            color: #FFFFFF;
        }
        #eval-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }
        #eval-modal.show { display: flex; }
        .eval-card {
            width: min(560px, 94vw);
            max-height: 80vh;
            overflow-y: auto;
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #E2E8F0;
            padding: 14px;
        }
        .eval-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .eval-close {
            border: 1px solid #CBD5E1;
            background: #F8FAFC;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            cursor: not-allowed;
        }
        .eval-close.active {
            cursor: pointer;
            background: #FFFFFF;
        }
        .eval-title {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
        }
        .eval-progress-text {
            margin: 0 0 6px;
            color: #334155;
            font-size: 13px;
        }
        .eval-progress {
            height: 8px;
            border-radius: 999px;
            background: #DBEAFE;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .eval-progress > span {
            display: block;
            height: 100%;
            background: #3B82F6;
            width: 0;
            transition: width .25s ease;
        }
        .eval-chat {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }
        .eval-row { display: flex; }
        .eval-row.ai { justify-content: flex-start; }
        .eval-row.user { justify-content: flex-end; }
        .eval-bubble {
            max-width: 82%;
            border-radius: 16px;
            padding: 9px 11px;
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .eval-bubble.ai { background: #F3F4F6; border-bottom-left-radius: 6px; }
        .eval-bubble.user { background: #3B82F6; color: #FFFFFF; border-bottom-right-radius: 6px; }
        .eval-input-wrap {
            display: flex;
            gap: 8px;
        }
        .eval-input {
            flex: 1;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 14px;
            outline: none;
        }
        .eval-send {
            border: none;
            border-radius: 10px;
            background: #3B82F6;
            color: #FFFFFF;
            padding: 0 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .eval-result {
            display: none;
            border-radius: 12px;
            padding: 12px;
            animation: fadeIn .25s ease;
            margin-bottom: 10px;
        }
        .eval-result.mastered { background: #DCFCE7; color: #14532D; }
        .eval-result.learning { background: #DBEAFE; color: #1E3A8A; }
        .eval-confirm {
            display: none;
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 10px;
            background: #3B82F6;
            color: #FFFFFF;
            font-weight: 700;
            cursor: pointer;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error {
            height: calc(100vh - 128px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #EF4444;
            font-weight: 700;
            text-align: center;
            padding: 20px;
        }
        @media (max-width: 820px) {
            .topbar {
                grid-template-columns: 1fr;
                height: auto;
                padding: 10px 12px;
            }
            .back-link, .path-title, .progress-pill {
                justify-self: start;
                text-align: left;
            }
            #graph-wrap {
                inset: 108px 0 64px 0;
            }
            #drawer {
                top: 108px;
                width: min(320px, 92vw);
                right: calc(-1 * min(320px, 92vw));
                height: calc(100vh - 172px);
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back-link" href="/bubble.html">← 返回 bubble.html</a>
        <div id="path-title" class="path-title">加载中...</div>
        <div id="progress-pill" class="progress-pill">已完成0 / 共0节点</div>
    </header>

    <main id="graph-wrap">
        <svg id="graph"></svg>
    </main>
    <div id="tooltip"></div>

    <div id="drawer-mask"></div>
    <aside id="drawer">
        <h2 id="drawer-title" class="drawer-title"></h2>
        <div class="chips">
            <span id="type-chip" class="chip"></span>
            <span id="status-chip" class="chip"></span>
        </div>
        <div id="drawer-desc" class="desc"></div>
        <div class="sub-title">前置依赖</div>
        <div id="prereq-list"></div>
        <a id="learn-btn" class="btn btn-blue" href="#">开始学习</a>
        <button id="assess-btn" class="btn btn-yellow" style="display:none;">状态判定</button>
    </aside>

    <div id="eval-modal">
        <div class="eval-card">
            <div class="eval-head">
                <h3 id="eval-node-title" class="eval-title"></h3>
                <button id="eval-close-btn" class="eval-close" type="button">✕</button>
            </div>
            <div id="eval-progress-text" class="eval-progress-text">第1/4轮对话</div>
            <div class="eval-progress"><span id="eval-progress-bar"></span></div>
            <div id="eval-chat" class="eval-chat"></div>
            <div id="eval-result" class="eval-result"></div>
            <div id="eval-input-wrap" class="eval-input-wrap">
                <input id="eval-input" class="eval-input" type="text" placeholder="输入你的回答">
                <button id="eval-send" class="eval-send" type="button">发送</button>
            </div>
            <button id="eval-confirm" class="eval-confirm" type="button">确认并更新状态</button>
        </div>
    </div>

    <footer class="bottom-bar">
        <a id="consult-btn" class="bottom-btn yellow" href="#">进入咨询，继续规划路径</a>
        <a class="bottom-btn blue" href="/tracker.html">查看学习记录</a>
    </footer>

    <script>
        const url = new URL(window.location.href);
        const pathId = (url.searchParams.get('path_id') || '').trim();
        const svg = d3.select('#graph');
        const tooltip = document.getElementById('tooltip');
        const drawer = document.getElementById('drawer');
        const drawerMask = document.getElementById('drawer-mask');
        const pathTitle = document.getElementById('path-title');
        const progressPill = document.getElementById('progress-pill');
        const consultBtn = document.getElementById('consult-btn');
        const assessBtn = document.getElementById('assess-btn');
        const evalModal = document.getElementById('eval-modal');
        const evalNodeTitle = document.getElementById('eval-node-title');
        const evalProgressText = document.getElementById('eval-progress-text');
        const evalProgressBar = document.getElementById('eval-progress-bar');
        const evalChat = document.getElementById('eval-chat');
        const evalInput = document.getElementById('eval-input');
        const evalSend = document.getElementById('eval-send');
        const evalResult = document.getElementById('eval-result');
        const evalConfirm = document.getElementById('eval-confirm');
        const evalCloseBtn = document.getElementById('eval-close-btn');
        let pathData = null;
        let nodeMap = new Map();
        let selectedNode = null;
        let evalRound = 0;
        let evalHistory = [];
        let evalDone = false;
        let evalResultStatus = 'learning';
        let evalResultAdvice = '';

        function getTypeStyle(type) {
            if (type === 'core') return { fill: '#3B82F6', stroke: '#3B82F6', text: '#FFFFFF', width: 2 };
            if (type === 'advanced') return { fill: '#1D4ED8', stroke: '#1D4ED8', text: '#FFFFFF', width: 2 };
            if (type === 'optional') return { fill: '#FEF9C3', stroke: '#F59E0B', text: '#92400E', width: 2 };
            return { fill: '#DBEAFE', stroke: '#3B82F6', text: '#1E3A8A', width: 2 };
        }

        function getStatusText(status, needsAssessment) {
            if (status === 'mastered') return '已掌握';
            if (status === 'learning') return '学习中';
            if (status === 'notStarted' && needsAssessment) return '待判定';
            return '未开始';
        }

        function statusIcon(status, needsAssessment) {
            if (status === 'mastered') return '✅';
            if (status === 'learning') return '⚡';
            if (status === 'notStarted' && needsAssessment) return '❓';
            return '🔒';
        }

        function openDrawer(node) {
            selectedNode = node;
            document.getElementById('drawer-title').textContent = node.label || node.id;
            document.getElementById('type-chip').textContent = node.type || 'prerequisite';
            document.getElementById('status-chip').textContent = getStatusText(node.status, node.needsAssessment);
            document.getElementById('drawer-desc').textContent = node.description || '暂无描述';
            document.getElementById('learn-btn').href = `/consult.html?path_id=${encodeURIComponent(pathId)}&node_id=${encodeURIComponent(node.id)}`;
            assessBtn.style.display = node.status === 'notStarted' && node.needsAssessment ? 'block' : 'none';
            const prereqList = document.getElementById('prereq-list');
            const prereq = (node.prerequisites || []).map((id) => nodeMap.get(id)).filter(Boolean);
            if (!prereq.length) {
                prereqList.innerHTML = '<div class="prereq-item"><span>无前置依赖</span><span>—</span></div>';
            } else {
                prereqList.innerHTML = prereq.map((n) => `<div class="prereq-item"><span>${n.label}</span><span>${statusIcon(n.status, n.needsAssessment)}</span></div>`).join('');
            }
            drawer.classList.add('show');
            drawerMask.classList.add('show');
        }

        function closeDrawer() {
            drawer.classList.remove('show');
            drawerMask.classList.remove('show');
        }

        function renderGraph(data) {
            const nodes = (data.nodes || []).map((d) => ({ ...d }));
            const links = (data.edges || []).map((e) => ({ source: e.from, target: e.to }));
            nodeMap = new Map(nodes.map((n) => [n.id, n]));
            const width = window.innerWidth;
            const height = Math.max(520, window.innerHeight - 128);
            svg.selectAll('*').remove();
            svg.style('opacity', 0);
            svg.attr('viewBox', `0 0 ${width} ${height}`);

            svg.append('defs').append('marker')
                .attr('id', 'arrow-blue')
                .attr('viewBox', '0 0 10 10')
                .attr('refX', 16)
                .attr('refY', 5)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto-start-reverse')
                .append('path')
                .attr('d', 'M 0 0 L 10 5 L 0 10 z')
                .attr('fill', '#3B82F6');

            const link = svg.append('g')
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('stroke-width', 2)
                .attr('stroke', (d) => {
                    const source = nodeMap.get(d.source.id || d.source);
                    return source && source.status === 'mastered' ? '#3B82F6' : '#CBD5E1';
                })
                .attr('stroke-dasharray', (d) => {
                    const source = nodeMap.get(d.source.id || d.source);
                    return source && source.status === 'mastered' ? null : '5,5';
                })
                .attr('marker-end', (d) => {
                    const source = nodeMap.get(d.source.id || d.source);
                    return source && source.status === 'mastered' ? 'url(#arrow-blue)' : null;
                });

            const node = svg.append('g')
                .selectAll('g')
                .data(nodes)
                .join('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragStarted)
                    .on('drag', dragged)
                    .on('end', dragEnded))
                .on('click', (_, d) => openDrawer(d))
                .on('mousemove', (event, d) => {
                    tooltip.style.opacity = '1';
                    tooltip.style.left = `${event.clientX + 12}px`;
                    tooltip.style.top = `${event.clientY - 10}px`;
                    tooltip.textContent = `${d.label} · ${getStatusText(d.status, d.needsAssessment)}`;
                })
                .on('mouseleave', () => {
                    tooltip.style.opacity = '0';
                });

            node.append('circle')
                .attr('r', 40)
                .attr('class', (d) => d.status === 'learning' ? 'node-circle learning-pulse' : 'node-circle')
                .attr('fill', (d) => getTypeStyle(d.type).fill)
                .attr('stroke', (d) => {
                    if (d.status === 'mastered') return '#22C55E';
                    if (d.status === 'learning') return '#3B82F6';
                    if (d.status === 'notStarted' && d.needsAssessment) return '#F59E0B';
                    return getTypeStyle(d.type).stroke;
                })
                .attr('stroke-width', (d) => {
                    if (d.status === 'mastered') return 3;
                    if (d.status === 'notStarted' && d.needsAssessment) return 3;
                    return getTypeStyle(d.type).width;
                })
                .attr('opacity', (d) => d.status === 'notStarted' ? 0.5 : 1);

            node.append('text')
                .attr('class', 'node-label')
                .attr('fill', (d) => getTypeStyle(d.type).text)
                .attr('y', 2)
                .text((d) => (d.label || '').slice(0, 8))
                .attr('opacity', (d) => d.status === 'notStarted' ? 0.8 : 1);

            node.filter((d) => d.status === 'mastered').append('text')
                .attr('class', 'node-badge')
                .attr('x', 24)
                .attr('y', -22)
                .text('✅');

            node.filter((d) => d.status === 'learning').append('text')
                .attr('class', 'node-badge')
                .attr('x', 24)
                .attr('y', -22)
                .text('⚡');

            node.filter((d) => d.status === 'notStarted' && d.needsAssessment).append('text')
                .attr('class', 'node-center-icon')
                .attr('y', 28)
                .text('❓');

            node.filter((d) => d.status === 'notStarted' && !d.needsAssessment).append('text')
                .attr('class', 'node-center-icon')
                .attr('y', 28)
                .text('🔒');

            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id((d) => d.id).distance(150))
                .force('charge', d3.forceManyBody().strength(-520))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collide', d3.forceCollide(64))
                .on('tick', () => {
                    link
                        .attr('x1', (d) => d.source.x)
                        .attr('y1', (d) => d.source.y)
                        .attr('x2', (d) => d.target.x)
                        .attr('y2', (d) => d.target.y);
                    node.attr('transform', (d) => `translate(${d.x},${d.y})`);
                });
            requestAnimationFrame(() => {
                svg.transition().duration(260).style('opacity', 1);
            });

            function dragStarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            function dragEnded(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
        }

        function renderTop(data) {
            const title = data.title || '未命名路径';
            const total = (data.nodes || []).length;
            const completed = (data.nodes || []).filter((n) => n.status === 'mastered').length;
            pathTitle.textContent = title;
            progressPill.textContent = `已完成${completed} / 共${total}节点`;
            consultBtn.href = `/consult.html?path_id=${encodeURIComponent(pathId)}`;
        }

        function appendEvalBubble(role, text) {
            const row = document.createElement('div');
            row.className = `eval-row ${role}`;
            const bubble = document.createElement('div');
            bubble.className = `eval-bubble ${role}`;
            bubble.textContent = text;
            row.appendChild(bubble);
            evalChat.appendChild(row);
            evalChat.scrollTop = evalChat.scrollHeight;
        }

        function updateEvalProgress() {
            const showRound = Math.max(1, Math.min(evalRound + 1, 4));
            evalProgressText.textContent = `第${showRound}/4轮对话`;
            evalProgressBar.style.width = `${(showRound / 4) * 100}%`;
        }

        function parseEvalResult(text) {
            if (text.includes('[RESULT:mastered]')) return 'mastered';
            if (text.includes('[RESULT:learning]')) return 'learning';
            return '';
        }

        function openEvalModal() {
            if (!selectedNode) return;
            evalRound = 0;
            evalHistory = [];
            evalDone = false;
            evalResultStatus = 'learning';
            evalResultAdvice = '';
            evalChat.innerHTML = '';
            evalResult.style.display = 'none';
            evalConfirm.style.display = 'none';
            document.getElementById('eval-input-wrap').style.display = 'flex';
            evalCloseBtn.classList.remove('active');
            evalCloseBtn.style.cursor = 'not-allowed';
            evalNodeTitle.textContent = selectedNode.label || selectedNode.id;
            updateEvalProgress();
            evalModal.classList.add('show');
            sendEvaluateTurn('');
        }

        function finishEvaluation(status, adviceText) {
            evalDone = true;
            evalResultStatus = status || 'learning';
            evalResultAdvice = adviceText || '';
            document.getElementById('eval-input-wrap').style.display = 'none';
            evalResult.className = `eval-result ${evalResultStatus}`;
            if (evalResultStatus === 'mastered') {
                evalResult.innerHTML = `✓ 恭喜！你已基本掌握该节点\n${evalResultAdvice}`;
            } else {
                evalResult.innerHTML = `📖 建议继续学习\n${evalResultAdvice}`;
            }
            evalResult.style.display = 'block';
            evalConfirm.style.display = 'block';
            evalCloseBtn.classList.add('active');
            evalCloseBtn.style.cursor = 'pointer';
        }

        async function sendEvaluateTurn(message) {
            if (!selectedNode || evalDone) return;
            if (message) {
                appendEvalBubble('user', message);
                evalHistory.push({ role: 'user', content: message });
            }
            evalSend.disabled = true;
            try {
                const res = await fetch('/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        node_name: selectedNode.label,
                        message,
                        history: evalHistory,
                        user_answer: message
                    })
                });
                const data = await res.json();
                const reply = data.response || '评估服务暂无返回';
                appendEvalBubble('ai', reply.replace('[RESULT:mastered]', '').replace('[RESULT:learning]', '').trim());
                evalHistory.push({ role: 'assistant', content: reply });
                const parsed = parseEvalResult(reply);
                evalRound += 1;
                updateEvalProgress();
                if (parsed) {
                    finishEvaluation(parsed, reply.replace('[RESULT:mastered]', '').replace('[RESULT:learning]', '').trim());
                    return;
                }
                if (evalRound >= 4) {
                    finishEvaluation('learning', reply);
                }
            } catch (_) {
                appendEvalBubble('ai', '评估请求失败，请稍后重试。');
                evalRound = Math.min(4, evalRound + 1);
                updateEvalProgress();
                if (evalRound >= 4) finishEvaluation('learning', '建议稍后重试评估流程。');
            } finally {
                evalSend.disabled = false;
            }
        }

        async function confirmEvalResult() {
            if (!selectedNode || !pathId) return;
            const newStatus = evalResultStatus === 'mastered' ? 'mastered' : 'learning';
            const res = await fetch('/update_node_status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    path_id: pathId,
                    node_id: selectedNode.id,
                    new_status: newStatus
                })
            });
            if (!res.ok) return;
            evalModal.classList.remove('show');
            closeDrawer();
            const next = await fetch(`/get_path/${encodeURIComponent(pathId)}`);
            if (!next.ok) return;
            const data = await next.json();
            pathData = data;
            renderTop(data);
            renderGraph(data);
        }

        function renderError(text) {
            document.getElementById('graph-wrap').innerHTML = `<div class="error">${text}</div>`;
        }

        if (!pathId) {
            renderError('缺少 path_id，请从 bubble 页面进入。');
        } else {
            fetch(`/get_path/${encodeURIComponent(pathId)}`)
                .then((res) => {
                    if (!res.ok) throw new Error('load failed');
                    return res.json();
                })
                .then((data) => {
                    pathData = data;
                    renderTop(data);
                    renderGraph(data);
                })
                .catch(() => {
                    renderError('路径加载失败，请检查后端服务或路径是否存在。');
                });
        }

        drawerMask.addEventListener('click', closeDrawer);
        assessBtn.addEventListener('click', openEvalModal);
        evalSend.addEventListener('click', () => {
            const text = evalInput.value.trim();
            if (!text || evalDone) return;
            evalInput.value = '';
            sendEvaluateTurn(text);
        });
        evalInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                const text = evalInput.value.trim();
                if (!text || evalDone) return;
                evalInput.value = '';
                sendEvaluateTurn(text);
            }
        });
        evalConfirm.addEventListener('click', confirmEvalResult);
        evalCloseBtn.addEventListener('click', () => {
            if (!evalDone) return;
            evalModal.classList.remove('show');
        });
        window.addEventListener('resize', () => {
            if (pathData) renderGraph(pathData);
        });
    </script>
</body>
</html>
