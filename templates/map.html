<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent学习地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #FAFAFA;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --brand-color: #3B82F6;
            --brand-color-dark: #1D4ED8;
            --brand-color-light: #EFF6FF;
            --brand-color-mid: #BFDBFE;
            --accent-yellow: #FBBF24;
            --accent-yellow-light: #FEF9C3;
            --border-color: #E5E7EB;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            line-height: 1.6;
        }
        #tree-container { position: relative; width: 100vw; height: 100vh; cursor: grab; }
        #tree-container:active { cursor: grabbing; }
        .node {
            position: absolute;
            width: 148px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            z-index: 10;
            text-align: center;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            opacity: 0;
            transform: translateY(20px);
            animation: fade-in-up .45s ease-in-out forwards;
            color: var(--text-primary);
        }
        .node:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }
        .completed {
            background: linear-gradient(135deg, #ecebff, #f3f4f6);
            color: var(--brand-color);
            border-color: #bdb8ff;
        }
        .active {
            background: linear-gradient(135deg, #f3f1ff, #ffffff);
            color: var(--brand-color);
            border-color: var(--brand-color);
        }
        .locked {
            background: #f5f5f5;
            color: #9ca3af;
            border-color: var(--border-color);
            cursor: not-allowed;
        }
        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .line {
            fill: none;
            stroke: #d1d5db;
            stroke-width: 1.6;
            stroke-dasharray: 0;
            opacity: .95;
        }
        .line-completed {
            stroke: var(--brand-color);
            stroke-width: 2;
            opacity: .95;
            filter: drop-shadow(0 1px 2px rgba(59, 130, 246, 0.25));
        }
        .header-title {
            position: fixed;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            color: var(--text-primary) !important;
            font-size: 48px !important;
            font-weight: 700 !important;
            letter-spacing: -0.5px !important;
            text-shadow: none;
            opacity: 0;
            animation: fade-in-up .45s ease-in-out .05s forwards;
        }
        #detail-backdrop {
            background: rgba(15, 23, 42, 0.18) !important;
            backdrop-filter: blur(2px);
        }
        #detail-panel {
            background: #ffffff !important;
            border-left: 1px solid var(--border-color) !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important;
            border-top-left-radius: 16px;
            border-bottom-left-radius: 16px;
        }
        #detail-title {
            font-size: 24px !important;
            font-weight: 600 !important;
            color: var(--text-primary) !important;
        }
        #detail-status {
            color: var(--text-secondary) !important;
            background: #f3f4f6 !important;
            border: 1px solid var(--border-color);
        }
        #detail-criteria {
            font-size: 16px !important;
            color: var(--text-primary) !important;
            line-height: 1.6 !important;
        }
        #close-detail-btn {
            color: var(--text-secondary) !important;
            transition: all 0.3s ease-in-out;
        }
        #close-detail-btn:hover { color: var(--text-primary) !important; }
        #detail-panel .text-sm {
            color: var(--text-secondary) !important;
            font-size: 14px !important;
        }
        #detail-panel button {
            border-radius: 12px !important;
            transition: all 0.25s ease-in-out !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid transparent;
            padding: 10px 20px !important;
            font-weight: 500 !important;
        }
        #detail-panel button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.2);
        }
        #detail-panel button:active { transform: translateY(0); box-shadow: none; }
        #enter-detail-btn,
        #advice-btn,
        #start-eval-btn {
            background: linear-gradient(135deg, var(--brand-color), #5a53e5) !important;
            color: #fff !important;
        }
        #regen-advice-btn {
            background: #f3f4f6 !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
            box-shadow: none !important;
        }
        #advice-result {
            background: #fff !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 16px !important;
            color: var(--text-primary) !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        #eval-overlay {
            background: rgba(250, 250, 250, 0.9) !important;
            backdrop-filter: blur(4px);
        }
        #eval-overlay > div {
            width: min(980px, 94vw);
            margin: 24px auto;
            height: calc(100vh - 48px);
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fade-in-up .45s ease-in-out forwards;
        }
        #eval-overlay > div > div:first-child {
            border-bottom: 1px solid var(--border-color) !important;
            background: #fff !important;
            position: relative;
            padding-top: 20px !important;
        }
        #eval-overlay > div > div:first-child::before {
            content: "";
            position: absolute;
            left: 24px;
            right: 24px;
            top: 8px;
            height: 10px;
            border-radius: 9999px;
            background: #eceff4;
        }
        #eval-overlay > div > div:first-child::after {
            content: "";
            position: absolute;
            left: 24px;
            top: 8px;
            width: 48%;
            height: 10px;
            border-radius: 9999px;
            background: linear-gradient(90deg, var(--brand-color), #5a53e5);
        }
        #eval-title {
            font-size: 32px !important;
            font-weight: 600 !important;
            color: var(--brand-color) !important;
        }
        #exit-eval-btn {
            background: #f3f4f6 !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-color);
            border-radius: 16px !important;
            transition: all 0.3s ease-in-out !important;
        }
        #exit-eval-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.12); }
        #eval-chat {
            background: #fafafa !important;
            padding: 24px !important;
        }
        #eval-chat > div {
            border-radius: 16px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important;
            border: 1px solid var(--border-color) !important;
            transition: all 0.3s ease-in-out !important;
            line-height: 1.6 !important;
            font-size: 16px !important;
        }
        #eval-chat > .mr-auto {
            background: #fff !important;
            color: var(--text-primary) !important;
        }
        #eval-chat > .ml-auto {
            background: linear-gradient(135deg, #edebff, #f3f4f6) !important;
            color: var(--text-primary) !important;
            border-color: #c7c4ff !important;
        }
        #eval-overlay .border-t {
            border-top: 1px solid var(--border-color) !important;
            background: #fff !important;
        }
        #mark-completed-btn {
            background: linear-gradient(135deg, var(--brand-color), #5a53e5) !important;
            color: #fff !important;
            border-radius: 16px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.3s ease-in-out !important;
        }
        #mark-completed-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.12); }
        #eval-input {
            background: #fff !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 16px !important;
            color: var(--text-primary) !important;
            font-size: 16px !important;
            line-height: 1.6 !important;
        }
        #eval-input:focus {
            border-color: var(--brand-color) !important;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15) !important;
        }
        #send-eval-btn {
            background: linear-gradient(135deg, var(--brand-color), #5a53e5) !important;
            color: #fff !important;
            border-radius: 16px !important;
            transition: all 0.3s ease-in-out !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        #send-eval-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.12); }
        .btn-tier-1 { background: #EFF6FF !important; border-color: #3B82F6 !important; color: #1D4ED8 !important; }
        .btn-tier-1:hover { background: #DBEAFE !important; }
        .btn-tier-2 { background: #FEF9C3 !important; border-color: #FBBF24 !important; color: #92400E !important; }
        .btn-tier-2:hover { background: #FDE68A !important; }
        .btn-tier-3 { background: #DBEAFE !important; border-color: #93C5FD !important; color: #1E40AF !important; }
        .btn-tier-3:hover { background: #BFDBFE !important; }
        .btn-tier-4 { background: #FFF7ED !important; border-color: #FCD34D !important; color: #B45309 !important; }
        .btn-tier-4:hover { background: #FFEDD5 !important; }
        [data-tooltip] {
            position: relative;
        }
        [data-tooltip]::before,
        [data-tooltip]::after {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1200;
        }
        [data-tooltip]::before {
            content: attr(data-tooltip);
            background: #1A1A2E;
            color: #FFFFFF;
            font-size: 13px;
            border-radius: 8px;
            padding: 6px 12px;
            white-space: nowrap;
            left: 50%;
            transform: translate(-50%, 4px);
            bottom: calc(100% + 10px);
        }
        [data-tooltip]::after {
            content: "";
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid #1A1A2E;
            left: 50%;
            transform: translate(-50%, 4px);
            bottom: calc(100% + 4px);
        }
        [data-tooltip][data-tooltip-pos="bottom"]::before {
            bottom: auto;
            top: calc(100% + 10px);
            transform: translate(-50%, -4px);
        }
        [data-tooltip][data-tooltip-pos="bottom"]::after {
            bottom: auto;
            top: calc(100% + 4px);
            border-top: none;
            border-bottom: 6px solid #1A1A2E;
            transform: translate(-50%, -4px);
        }
        [data-tooltip].tooltip-visible::before,
        [data-tooltip].tooltip-visible::after {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .stream-skeleton {
            height: 20px;
            border-radius: 9999px;
            background: linear-gradient(90deg, #dbeafe, #bfdbfe, #dbeafe);
            background-size: 220% 100%;
            animation: skeleton-move 1.2s linear infinite;
        }
        .stream-cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: var(--brand-color);
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: cursor-blink 1s infinite;
        }
        .stream-actions {
            margin-top: 8px;
            display: none;
            gap: 8px;
            justify-content: flex-end;
        }
        .stream-actions.show { display: flex; }
        .stream-mini-btn {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            background: #fff;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s ease-in-out;
        }
        .stream-mini-btn:hover {
            background: var(--brand-color-light);
            color: var(--brand-color-dark);
            border-color: var(--brand-color-mid);
        }
        @keyframes skeleton-move {
            from { background-position: 100% 0; }
            to { background-position: -100% 0; }
        }
        @keyframes cursor-blink {
            0%, 45% { opacity: 1; }
            55%, 100% { opacity: 0; }
        }
        .eval-option { background: #F3F4F6; border: 1px solid var(--border-color); border-radius: 16px; }
        .eval-option.selected { background: #EFF6FF; border-color: #3B82F6; color: #1D4ED8; }
        .eval-option.correct { background: #D1FAE5; border-color: #10b981; color: #065f46; }
        .eval-option.wrong { background: #FEE2E2; border-color: #ef4444; color: #991b1b; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1 class="header-title text-3xl font-black tracking-widest uppercase italic text-sky-400">
         Agent 学习地图
    </h1>

    <div id="tree-container">
        <svg id="svg-layer"></svg>
        </div>

    <div id="detail-overlay" class="fixed inset-0 hidden z-50">
        <div id="detail-backdrop" class="absolute inset-0 bg-black/50"></div>
        <aside id="detail-panel" class="absolute right-0 top-0 h-full w-[420px] max-w-[92vw] bg-slate-900 border-l border-slate-700 shadow-2xl transform translate-x-full transition-transform duration-300 ease-out">
            <div class="h-full flex flex-col p-6">
                <div class="flex items-start justify-between gap-3">
                    <div>
                        <h3 id="detail-title" class="text-xl font-bold text-sky-300"></h3>
                        <div class="mt-2">
                            <span id="detail-status" class="text-xs px-2 py-1 rounded-full bg-slate-700 text-slate-200"></span>
                        </div>
                    </div>
                    <button id="close-detail-btn" class="text-slate-400 hover:text-white text-lg leading-none px-2">×</button>
                </div>

                <div class="mt-6">
                    <div class="text-sm text-slate-400 mb-2">完成标准</div>
                    <p id="detail-criteria" class="text-sm leading-relaxed text-slate-200 whitespace-pre-line"></p>
                </div>

                <div class="mt-6">
                    <button id="enter-detail-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg transition font-medium hidden">进入详情页</button>
                </div>

                <div class="mt-3">
                    <button id="advice-btn" class="w-full bg-sky-600 hover:bg-sky-500 px-4 py-2 rounded-lg transition font-medium">获取学习建议</button>
                </div>
                <div class="mt-3">
                    <button id="start-eval-btn" class="w-full bg-violet-600 hover:bg-violet-500 px-4 py-2 rounded-lg transition font-medium">开始评估</button>
                </div>

                <div class="mt-4 flex-1 min-h-0">
                    <div class="text-sm text-slate-400 mb-2">建议结果</div>
                    <div id="advice-result" class="h-full overflow-y-auto bg-slate-800/70 border border-slate-700 rounded-lg p-3 text-sm leading-relaxed whitespace-pre-wrap"></div>
                    <button id="regen-advice-btn" class="mt-2 text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded transition hidden">重新生成</button>
                </div>
            </div>
        </aside>
    </div>

    <div id="eval-overlay" class="fixed inset-0 hidden z-[60] bg-slate-950">
        <div class="h-full w-full flex flex-col">
            <div class="px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                <h2 id="eval-title" class="text-lg font-bold text-sky-300"></h2>
                <button id="exit-eval-btn" class="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded transition">退出评估</button>
            </div>
            <div id="eval-chat" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-950"></div>
            <div class="p-4 border-t border-slate-800 bg-slate-900">
                <button id="mark-completed-btn" class="w-full mb-3 bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg transition font-medium hidden">标记为已完成</button>
                <div class="flex gap-3">
                    <input id="eval-input" type="text" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-violet-500" placeholder="输入你的回答，输入“退出”可结束评估">
                    <button id="send-eval-btn" class="bg-violet-600 hover:bg-violet-500 px-5 py-2 rounded-lg transition font-medium">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let nodes = [];
        let edges = [];
        const statusTextMap = {
            completed: '已完成',
            active: '进行中',
            locked: '未解锁'
        };

        const container = document.getElementById('tree-container');
        const svg = document.getElementById('svg-layer');
        const detailOverlay = document.getElementById('detail-overlay');
        const detailBackdrop = document.getElementById('detail-backdrop');
        const detailPanel = document.getElementById('detail-panel');
        const detailTitle = document.getElementById('detail-title');
        const detailStatus = document.getElementById('detail-status');
        const detailCriteria = document.getElementById('detail-criteria');
        const adviceBtn = document.getElementById('advice-btn');
        const enterDetailBtn = document.getElementById('enter-detail-btn');
        const startEvalBtn = document.getElementById('start-eval-btn');
        const regenAdviceBtn = document.getElementById('regen-advice-btn');
        const adviceResult = document.getElementById('advice-result');
        const closeDetailBtn = document.getElementById('close-detail-btn');
        const evalOverlay = document.getElementById('eval-overlay');
        const evalTitle = document.getElementById('eval-title');
        const evalChat = document.getElementById('eval-chat');
        const evalInput = document.getElementById('eval-input');
        const sendEvalBtn = document.getElementById('send-eval-btn');
        const exitEvalBtn = document.getElementById('exit-eval-btn');
        const markCompletedBtn = document.getElementById('mark-completed-btn');
        let currentNode = null;
        let evalHistory = [];
        let evalPassed = false;
        let adviceLoadToken = 0;
        let lastAdviceQuery = '';
        const buttonTierCycle = ['btn-tier-1', 'btn-tier-2', 'btn-tier-3', 'btn-tier-4'];

        async function loadSkillTree() {
            const res = await fetch('/skills/tree');
            const data = await res.json();
            nodes = data.nodes || [];
            edges = data.edges || [];
            svg.innerHTML = '';
            container.querySelectorAll('.node').forEach((n) => n.remove());
            renderNodes();
            renderEdges();
        }

        function applyButtonTierCycle() {
            const btns = [
                enterDetailBtn,
                adviceBtn,
                startEvalBtn,
                regenAdviceBtn,
                exitEvalBtn,
                markCompletedBtn,
                sendEvalBtn
            ].filter(Boolean);
            btns.forEach((btn, idx) => {
                buttonTierCycle.forEach((tier) => btn.classList.remove(tier));
                btn.classList.add(buttonTierCycle[idx % buttonTierCycle.length]);
            });
        }

        function initTooltips() {
            const tooltipText = new Map([
                [closeDetailBtn, '关闭当前面板'],
                [enterDetailBtn, '进入节点详情'],
                [adviceBtn, '生成学习建议'],
                [startEvalBtn, '开启能力评估'],
                [regenAdviceBtn, '刷新建议内容'],
                [exitEvalBtn, '退出评估模式'],
                [sendEvalBtn, '提交本轮回答'],
                [markCompletedBtn, '将节点标记完成']
            ]);
            tooltipText.forEach((text, el) => {
                if (!el) return;
                el.setAttribute('data-tooltip', text);
                let timer = null;
                const show = () => {
                    const rect = el.getBoundingClientRect();
                    const nearTop = rect.top < 64;
                    const nearRight = rect.right > window.innerWidth - 20;
                    const nearLeft = rect.left < 20;
                    el.setAttribute('data-tooltip-pos', nearTop || nearRight || nearLeft ? 'bottom' : 'top');
                    timer = setTimeout(() => el.classList.add('tooltip-visible'), 300);
                };
                const hide = () => {
                    clearTimeout(timer);
                    el.classList.remove('tooltip-visible');
                };
                el.addEventListener('mouseenter', show);
                el.addEventListener('mouseleave', hide);
                el.addEventListener('blur', hide);
            });
        }

        function renderNodes() {
            nodes.forEach(node => {
                const div = document.createElement('div');
                div.id = node.id;
                div.className = `node ${node.status}`;
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                div.innerText = node.label;

                div.onclick = () => {
                    openDetailPanel(node);
                };

                container.appendChild(div);
            });
        }

        function renderEdges() {
            edges.forEach(edge => {
                const fromNode = nodes.find(n => n.id === edge.from);
                const toNode = nodes.find(n => n.id === edge.to);

                if (fromNode && toNode) {
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    
                    // 计算起点终点（节点中心）
                    const x1 = fromNode.x + 140;
                    const y1 = fromNode.y + 25;
                    const x2 = toNode.x;
                    const y2 = toNode.y + 25;

                    // 绘制三次贝塞尔曲线
                    const cp1x = x1 + (x2 - x1) / 2;
                    const d = `M ${x1} ${y1} C ${cp1x} ${y1}, ${cp1x} ${y2}, ${x2} ${y2}`;
                    
                    path.setAttribute("d", d);
                    path.setAttribute("class", `line ${fromNode.status === 'completed' && toNode.status !== 'locked' ? 'line-completed' : ''}`);
                    svg.appendChild(path);
                }
            });
        }

        function setStatusBadge(status) {
            detailStatus.className = 'text-xs px-2 py-1 rounded-full';
            if (status === 'completed') {
                detailStatus.classList.add('bg-emerald-700', 'text-emerald-100');
            } else if (status === 'active') {
                detailStatus.classList.add('bg-sky-700', 'text-sky-100');
            } else {
                detailStatus.classList.add('bg-slate-700', 'text-slate-200');
            }
            detailStatus.innerText = statusTextMap[status] || status;
        }

        function openDetailPanel(node) {
            currentNode = node;
            detailTitle.innerText = node.label;
            setStatusBadge(node.status);
            detailCriteria.innerText = node.criteria || '该节点暂无完成标准描述。';
            adviceResult.innerText = '点击“获取学习建议”，系统会基于你的学习记录返回针对性建议。';
            regenAdviceBtn.classList.add('hidden');
            adviceBtn.disabled = false;
            adviceBtn.innerText = '获取学习建议';
            if (node.link) {
                enterDetailBtn.classList.remove('hidden');
            } else {
                enterDetailBtn.classList.add('hidden');
            }
            if (node.status === 'locked') {
                startEvalBtn.classList.add('hidden');
            } else if (node.status === 'completed') {
                startEvalBtn.classList.remove('hidden');
                startEvalBtn.innerText = '复习巩固';
            } else {
                startEvalBtn.classList.remove('hidden');
                startEvalBtn.innerText = '开始评估';
            }
            detailOverlay.classList.remove('hidden');
            requestAnimationFrame(() => {
                detailPanel.classList.remove('translate-x-full');
            });
            const currentToken = ++adviceLoadToken;
            loadSavedAdviceOnOpen(node, currentToken);
        }

        function closeDetailPanel() {
            detailPanel.classList.add('translate-x-full');
            setTimeout(() => {
                detailOverlay.classList.add('hidden');
            }, 300);
        }

        async function generateAndSaveAdvice() {
            if (!currentNode) return;
            const query = `请基于我的学习记录，围绕“${currentNode.label}”给出3条可执行建议，并附一个自测题。`;
            lastAdviceQuery = query;
            adviceBtn.disabled = true;
            adviceBtn.innerText = '生成中...';
            adviceResult.innerHTML = `
                <div class="stream-skeleton"></div>
                <span class="stream-text"></span><span class="stream-cursor"></span>
                <div class="stream-actions">
                    <button class="stream-mini-btn" id="copy-advice-btn">复制</button>
                    <button class="stream-mini-btn" id="regen-advice-inline-btn">重新生成</button>
                </div>
            `;
            const streamText = adviceResult.querySelector('.stream-text');
            const streamSkeleton = adviceResult.querySelector('.stream-skeleton');
            const streamCursor = adviceResult.querySelector('.stream-cursor');
            const streamActions = adviceResult.querySelector('.stream-actions');
            const res = await fetch('/chat_stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query})
            });
            if (!res.ok || !res.body) {
                adviceResult.innerText = '请求失败，请检查服务状态后重试。';
                adviceBtn.disabled = false;
                adviceBtn.innerText = '获取学习建议';
                return;
            }
            const reader = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            let fullText = '';
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split('\n\n');
                buffer = events.pop() || '';
                for (const evt of events) {
                    const lines = evt.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        if (streamSkeleton && streamSkeleton.style.display !== 'none') {
                            streamSkeleton.style.display = 'none';
                        }
                        fullText += data;
                        if (streamText) streamText.textContent = fullText;
                        adviceResult.scrollTop = adviceResult.scrollHeight;
                    }
                }
            }
            if (streamCursor) streamCursor.style.display = 'none';
            if (streamActions) streamActions.classList.add('show');
            const copyBtn = document.getElementById('copy-advice-btn');
            const regenInlineBtn = document.getElementById('regen-advice-inline-btn');
            if (copyBtn) {
                copyBtn.addEventListener('click', async () => {
                    try {
                        await navigator.clipboard.writeText(fullText);
                        copyBtn.textContent = '已复制';
                        setTimeout(() => copyBtn.textContent = '复制', 1200);
                    } catch (_) {}
                });
            }
            if (regenInlineBtn) {
                regenInlineBtn.addEventListener('click', async () => {
                    await generateAndSaveAdvice();
                });
            }
            await fetch('/save_advice', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({node_id: currentNode.id, advice: fullText})
            });
            adviceBtn.disabled = false;
            adviceBtn.innerText = '获取学习建议';
            regenAdviceBtn.classList.remove('hidden');
        }

        async function getLearningAdvice(forceRegenerate = false) {
            if (!currentNode) return;
            adviceBtn.disabled = true;
            adviceBtn.innerText = '获取中...';
            try {
                if (!forceRegenerate) {
                    const cachedRes = await fetch(`/get_advice?node_id=${encodeURIComponent(currentNode.id)}`);
                    const cachedData = await cachedRes.json();
                    if (cachedData.found && cachedData.advice) {
                        adviceResult.innerText = cachedData.advice;
                        regenAdviceBtn.classList.remove('hidden');
                        return;
                    }
                }
                await generateAndSaveAdvice();
            } catch (error) {
                adviceResult.innerText = '请求失败，请检查服务状态后重试。';
            } finally {
                if (!adviceBtn.disabled) {
                    adviceBtn.disabled = false;
                    adviceBtn.innerText = '获取学习建议';
                }
            }
        }

        async function loadSavedAdviceOnOpen(node, token) {
            try {
                const cachedRes = await fetch(`/get_advice?node_id=${encodeURIComponent(node.id)}`);
                const cachedData = await cachedRes.json();
                if (token !== adviceLoadToken || !currentNode || currentNode.id !== node.id) return;
                if (cachedData.found && cachedData.advice) {
                    adviceResult.innerText = cachedData.advice;
                    regenAdviceBtn.classList.remove('hidden');
                } else {
                    adviceResult.innerText = '点击“获取学习建议”，系统会基于你的学习记录返回针对性建议。';
                    regenAdviceBtn.classList.add('hidden');
                }
            } catch (error) {
                if (token !== adviceLoadToken) return;
                adviceResult.innerText = '点击“获取学习建议”，系统会基于你的学习记录返回针对性建议。';
                regenAdviceBtn.classList.add('hidden');
            }
        }

        function appendEvalMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'assistant'
                ? 'max-w-[80%] mr-auto bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm leading-relaxed'
                : 'max-w-[80%] ml-auto bg-violet-900/60 border border-violet-700 rounded-lg p-3 text-sm leading-relaxed';
            div.textContent = text;
            evalChat.appendChild(div);
            evalChat.scrollTop = evalChat.scrollHeight;
            return div;
        }

        async function streamTextToElement(el, text) {
            el.innerHTML = `<div class="stream-skeleton"></div><span class="stream-cursor"></span>`;
            const skeleton = el.querySelector('.stream-skeleton');
            const cursor = el.querySelector('.stream-cursor');
            const content = document.createElement('span');
            content.style.whiteSpace = 'pre-wrap';
            content.style.wordBreak = 'break-word';
            el.prepend(content);
            for (const ch of text) {
                if (skeleton && skeleton.style.display !== 'none') {
                    skeleton.style.display = 'none';
                }
                content.textContent += ch;
                evalChat.scrollTop = evalChat.scrollHeight;
                await new Promise((resolve) => setTimeout(resolve, 8));
            }
            if (cursor) cursor.style.display = 'none';
        }

        function closeEvalOverlay() {
            evalOverlay.classList.add('hidden');
        }

        async function requestEvaluation(userAnswer) {
            if (!currentNode) return;
            sendEvalBtn.disabled = true;
            sendEvalBtn.innerText = '发送中...';
            try {
                const res = await fetch('/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        node_id: currentNode.id,
                        history: evalHistory,
                        user_answer: userAnswer
                    })
                });
                const data = await res.json();
                const reply = data.response || '评估服务暂无返回，请稍后重试。';
                evalHistory.push({ role: 'assistant', content: reply });
                const bubble = appendEvalMessage('assistant', '');
                await streamTextToElement(bubble, reply);
                evalPassed = !!data.passed;
                if (evalPassed) {
                    markCompletedBtn.classList.remove('hidden');
                }
            } catch (error) {
                appendEvalMessage('assistant', '评估请求失败，请检查服务状态后重试。');
            } finally {
                sendEvalBtn.disabled = false;
                sendEvalBtn.innerText = '发送';
            }
        }

        function openEvalOverlay() {
            if (!currentNode) return;
            evalHistory = [];
            evalPassed = false;
            evalTitle.innerText = `${currentNode.label} · 评估模式`;
            evalChat.innerHTML = '';
            evalInput.value = '';
            markCompletedBtn.classList.add('hidden');
            evalOverlay.classList.remove('hidden');
            requestEvaluation('');
            setTimeout(() => evalInput.focus(), 50);
        }

        async function sendEvalMessage() {
            const text = evalInput.value.trim();
            if (!text) return;
            evalInput.value = '';
            if (text === '退出') {
                closeEvalOverlay();
                return;
            }
            evalHistory.push({ role: 'user', content: text });
            appendEvalMessage('user', text);
            await requestEvaluation(text);
        }

        function markCurrentNodeCompleted() {
            if (!currentNode) return;
            fetch('/skills/complete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({node_id: currentNode.id})
            }).then(async (res) => {
                if (!res.ok) {
                    appendEvalMessage('assistant', '标记失败，请稍后重试。');
                    return;
                }
                await loadSkillTree();
                const refreshed = nodes.find(n => n.id === currentNode.id);
                if (refreshed) {
                    currentNode = refreshed;
                    setStatusBadge(currentNode.status);
                }
                closeEvalOverlay();
            }).catch(() => {
                appendEvalMessage('assistant', '标记失败，请检查服务状态后重试。');
            });
        }

        detailBackdrop.addEventListener('click', closeDetailPanel);
        detailOverlay.addEventListener('click', (event) => {
            if (event.target === detailOverlay) {
                closeDetailPanel();
            }
        });
        detailPanel.addEventListener('click', (event) => event.stopPropagation());
        closeDetailBtn.addEventListener('click', closeDetailPanel);
        adviceBtn.addEventListener('click', getLearningAdvice);
        regenAdviceBtn.addEventListener('click', () => getLearningAdvice(true));
        startEvalBtn.addEventListener('click', openEvalOverlay);
        enterDetailBtn.addEventListener('click', () => {
            if (currentNode && currentNode.link) {
                window.location.href = currentNode.link;
            }
        });
        exitEvalBtn.addEventListener('click', closeEvalOverlay);
        sendEvalBtn.addEventListener('click', sendEvalMessage);
        evalInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendEvalMessage();
            }
        });
        markCompletedBtn.addEventListener('click', markCurrentNodeCompleted);

        // 简单的平移拖拽功能
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX;
            startY = e.pageY;
        });
        window.addEventListener('mouseup', () => isDragging = false);
        applyButtonTierCycle();
        initTooltips();
        loadSkillTree();
    </script>
</body>
</html>
