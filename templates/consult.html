<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规划你的学习路径</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #F8FAFC; color: #0F172A; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
        .shell {
            width: min(1080px, 94vw);
            margin: 16px auto;
            height: calc(100vh - 32px);
            display: grid;
            grid-template-rows: auto 1fr auto auto auto;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            overflow: hidden;
            background: #FFFFFF;
        }
        .topbar {
            min-height: 62px;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            gap: 10px;
        }
        .back { color: #1D4ED8; text-decoration: none; font-weight: 600; }
        .title { margin: 0; font-size: 20px; font-weight: 800; }
        .context-tag {
            font-size: 12px;
            color: #1E3A8A;
            background: #EFF6FF;
            border: 1px solid #BFDBFE;
            border-radius: 999px;
            padding: 4px 10px;
        }
        .chat {
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #FFFFFF;
        }
        .row { display: flex; }
        .row.ai { justify-content: flex-start; }
        .row.user { justify-content: flex-end; }
        .bubble-wrap { max-width: 78%; }
        .bubble {
            position: relative;
            border-radius: 16px;
            padding: 10px 12px;
            font-size: 15px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .bubble.ai { background: #F3F4F6; color: #111827; border-bottom-left-radius: 6px; }
        .bubble.user { background: #3B82F6; color: #FFFFFF; border-bottom-right-radius: 6px; }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #3B82F6;
            vertical-align: text-bottom;
            margin-left: 2px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,45%{opacity:1;} 55%,100%{opacity:0;} }
        .bubble-actions { margin-top: 6px; display: none; gap: 8px; }
        .bubble-actions.show { display: flex; animation: fadeIn .25s ease; }
        .mini-btn {
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            background: #FFFFFF;
            color: #475569;
            font-size: 12px;
            padding: 4px 8px;
            cursor: pointer;
        }
        .upload-zone {
            border-top: 1px solid #E2E8F0;
            border-bottom: 1px solid #E2E8F0;
            padding: 10px 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .upload-card { border-radius: 14px; padding: 10px; background: #FFFFFF; }
        .upload-card.blue { border: 1px solid #3B82F6; }
        .upload-card.yellow { border: 1px solid #FBBF24; }
        .upload-title { margin: 0 0 6px; font-size: 16px; font-weight: 800; }
        .upload-tip { margin: 0; color: #64748B; font-size: 13px; }
        .file-name { margin-top: 6px; color: #0F172A; font-size: 12px; min-height: 18px; }
        .composer {
            padding: 10px 14px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: end;
            background: #FFFFFF;
        }
        #input {
            min-height: 52px;
            max-height: 180px;
            resize: none;
            border: 1px solid #CBD5E1;
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            line-height: 1.5;
            outline: none;
        }
        #input:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        .actions { display: flex; gap: 8px; align-items: center; }
        .send-btn {
            border: none;
            border-radius: 10px;
            background: #3B82F6;
            color: #FFFFFF;
            padding: 0 16px;
            height: 40px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid #CBD5E1;
            background: #FFFFFF;
            cursor: pointer;
            font-size: 16px;
        }
        .gen-wrap {
            padding: 0 14px 12px;
            display: none;
            justify-content: flex-end;
            background: #FFFFFF;
            opacity: 0;
            transform: translateY(10px);
        }
        .gen-wrap.show { display: flex; animation: fadeIn .3s ease forwards; }
        .gen-btn {
            border: none;
            height: 40px;
            border-radius: 10px;
            background: #2563EB;
            color: #FFFFFF;
            padding: 0 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .suggest-group {
            margin-top: 8px;
            display: grid;
            gap: 8px;
        }
        .suggest-card {
            display: grid;
            grid-template-columns: 6px 1fr auto;
            gap: 10px;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
            transition: transform .2s ease, opacity .2s ease;
        }
        .suggest-card.removing { opacity: 0; transform: translateX(24px); }
        .suggest-bar { border-radius: 8px; }
        .suggest-name { margin: 0 0 4px; font-size: 15px; font-weight: 800; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .type-badge {
            font-size: 11px;
            border-radius: 999px;
            padding: 2px 8px;
            background: #EFF6FF;
            color: #1D4ED8;
            border: 1px solid #BFDBFE;
        }
        .suggest-desc { margin: 0; font-size: 13px; color: #475569; line-height: 1.6; }
        .suggest-actions { display: flex; gap: 8px; align-items: center; }
        .add-btn {
            border: none;
            border-radius: 8px;
            height: 32px;
            padding: 0 10px;
            background: #3B82F6;
            color: #FFFFFF;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .add-btn:disabled { background: #94A3B8; cursor: not-allowed; }
        .skip-btn {
            border: none;
            background: transparent;
            color: #64748B;
            font-size: 12px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: #16A34A;
            color: #FFFFFF;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(6px);
            pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
            z-index: 50;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
        @media (max-width: 920px) {
            .shell { width: 100vw; height: 100vh; margin: 0; border-radius: 0; }
            .upload-zone { grid-template-columns: 1fr; }
            .composer { grid-template-columns: 1fr; }
            .topbar { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <a id="back-link" class="back" href="/bubble.html">← 返回 bubble.html</a>
            <h1 class="title">规划你的学习路径</h1>
            <div id="context-tag" class="context-tag" style="display:none;"></div>
        </header>

        <section id="chat" class="chat"></section>

        <section class="upload-zone">
            <article class="upload-card blue">
                <h3 class="upload-title">📓 学习过程记录</h3>
                <p class="upload-tip">笔记、作业、日志 → AI 分析已掌握内容</p>
                <div id="record-name" class="file-name"></div>
            </article>
            <article class="upload-card yellow">
                <h3 class="upload-title">📚 知识库</h3>
                <p class="upload-tip">教材、文档、参考资料 → AI 推荐新学习节点</p>
                <div id="knowledge-name" class="file-name"></div>
            </article>
            <input id="record-file" type="file" accept=".txt,.pdf,.md" hidden>
            <input id="knowledge-file" type="file" accept=".txt,.pdf,.md" hidden>
        </section>

        <section class="composer">
            <textarea id="input"></textarea>
            <div class="actions">
                <button id="record-trigger" class="icon-btn" title="上传学习记录">📝</button>
                <button id="knowledge-trigger" class="icon-btn" title="上传知识库">📚</button>
                <button id="send-btn" class="send-btn">发送</button>
            </div>
        </section>

        <div id="gen-wrap" class="gen-wrap">
            <button id="gen-btn" class="gen-btn">生成节点图</button>
        </div>
    </main>
    <div id="toast" class="toast"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pathId = (params.get('path_id') || '').trim();
        const nodeId = (params.get('node_id') || '').trim();
        const isAppendMode = !!pathId;
        const isNodeMode = !!pathId && !!nodeId;
        let pathName = '';
        let nodeName = '';
        let aiCount = 0;
        let lastUserPrompt = '';
        let pendingNodeAdds = [];
        let pendingRecordFile = null;
        let pendingKnowledgeFile = null;
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const backLink = document.getElementById('back-link');
        const contextTag = document.getElementById('context-tag');
        const genWrap = document.getElementById('gen-wrap');
        const genBtn = document.getElementById('gen-btn');
        const recordFile = document.getElementById('record-file');
        const knowledgeFile = document.getElementById('knowledge-file');
        const toast = document.getElementById('toast');

        function autoGrow() {
            input.style.height = '52px';
            input.style.height = `${Math.min(input.scrollHeight, 180)}px`;
        }

        function escapeHtml(text) {
            return String(text)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function addBubble(role, text = '') {
            const row = document.createElement('div');
            row.className = `row ${role}`;
            const wrap = document.createElement('div');
            wrap.className = 'bubble-wrap';
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;
            bubble.innerHTML = escapeHtml(text);
            wrap.appendChild(bubble);
            row.appendChild(wrap);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
            return { row, wrap, bubble };
        }

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function showAiActions(wrap, text, promptForRegenerate) {
            const actions = document.createElement('div');
            actions.className = 'bubble-actions show';
            actions.innerHTML = '<button class="mini-btn">复制</button><button class="mini-btn">重新生成</button>';
            const [copyBtn, regenBtn] = actions.querySelectorAll('.mini-btn');
            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(text);
                    copyBtn.textContent = '已复制';
                    setTimeout(() => copyBtn.textContent = '复制', 1000);
                } catch (_) {}
            });
            regenBtn.addEventListener('click', async () => {
                await requestAi(promptForRegenerate, false);
            });
            wrap.appendChild(actions);
        }

        function showStaticAiBubble(text) {
            addBubble('ai', text || '');
        }

        async function requestAi(prompt, countAsConversation = true) {
            const ai = addBubble('ai', '');
            sendBtn.disabled = true;
            sendBtn.textContent = '生成中...';
            let finalText = '';
            try {
                ai.bubble.innerHTML = '<span class="cursor"></span>';
                const res = await fetch('/chat_stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: prompt })
                });
                if (!res.ok || !res.body) {
                    throw new Error('stream failed');
                }
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let doneBySignal = false;
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const events = buffer.split('\n\n');
                    buffer = events.pop() || '';
                    for (const evt of events) {
                        const lines = evt.split('\n');
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                doneBySignal = true;
                                break;
                            }
                            finalText += data;
                            ai.bubble.innerHTML = `${escapeHtml(finalText)}<span class="cursor"></span>`;
                            chat.scrollTop = chat.scrollHeight;
                        }
                        if (doneBySignal) break;
                    }
                    if (doneBySignal) break;
                }
                ai.bubble.innerHTML = escapeHtml(finalText);
                showAiActions(ai.wrap, finalText, prompt);
                if (countAsConversation) {
                    aiCount += 1;
                    if (aiCount >= 2) genWrap.classList.add('show');
                }
            } catch (_) {
                ai.bubble.textContent = '请求失败，请检查后端服务。';
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
            return finalText;
        }

        function extractJsonBlock(text) {
            if (!text) return null;
            const match = text.match(/```json\s*([\s\S]*?)\s*```/i);
            if (!match) return null;
            try {
                return JSON.parse(match[1]);
            } catch (_) {
                return null;
            }
        }

        function todayDate() {
            const d = new Date();
            const m = `${d.getMonth() + 1}`.padStart(2, '0');
            const day = `${d.getDate()}`.padStart(2, '0');
            return `${d.getFullYear()}-${m}-${day}`;
        }

        function typeColor(type) {
            if (type === 'core') return '#3B82F6';
            if (type === 'advanced') return '#1D4ED8';
            if (type === 'optional') return '#F59E0B';
            return '#3B82F6';
        }

        function renderSuggestionGroup(anchorRow, suggestions) {
            if (!Array.isArray(suggestions) || !suggestions.length) return;
            const group = document.createElement('div');
            group.className = 'suggest-group';
            suggestions.forEach((item, idx) => {
                const type = item.type || 'prerequisite';
                const card = document.createElement('article');
                card.className = 'suggest-card';
                card.innerHTML = `
                    <div class="suggest-bar" style="background:${typeColor(type)};"></div>
                    <div>
                        <h4 class="suggest-name">
                            <span>${escapeHtml(item.label || '未命名节点')}</span>
                            <span class="type-badge">${escapeHtml(type)}</span>
                        </h4>
                        <p class="suggest-desc">${escapeHtml(item.description || '')}</p>
                        <p class="suggest-desc">推荐理由：${escapeHtml(item.reason || '')}</p>
                    </div>
                    <div class="suggest-actions">
                        <button class="add-btn" type="button">添加到路径</button>
                        <button class="skip-btn" type="button">跳过</button>
                    </div>
                `;
                const addBtn = card.querySelector('.add-btn');
                const skipBtn = card.querySelector('.skip-btn');
                addBtn.addEventListener('click', async () => {
                    const node = {
                        id: `sg_${Date.now()}_${idx}`,
                        label: item.label || '新增节点',
                        type,
                        status: 'notStarted',
                        needsAssessment: true,
                        description: item.description || ''
                    };
                    if (pathId) {
                        const res = await fetch('/save_path', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ path_id: pathId, append_node: node })
                        });
                        if (!res.ok) return;
                    } else {
                        pendingNodeAdds.push(node);
                    }
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ 已添加';
                });
                skipBtn.addEventListener('click', () => {
                    card.classList.add('removing');
                    setTimeout(() => card.remove(), 220);
                });
                group.appendChild(card);
            });
            anchorRow.insertAdjacentElement('afterend', group);
            chat.scrollTop = chat.scrollHeight;
        }

        function updateModeUI() {
            if (isAppendMode) {
                backLink.href = `/map.html?path_id=${encodeURIComponent(pathId)}`;
            } else {
                backLink.href = '/bubble.html';
            }
            if (isNodeMode && nodeName) {
                contextTag.style.display = 'inline-block';
                contextTag.textContent = `当前节点：${nodeName}`;
            }
            if (isNodeMode) {
                input.placeholder = '你可以讲讲你做过的实践、理解的要点或目前卡住的问题...';
            } else if (isAppendMode) {
                input.placeholder = '想继续深化还是拓展新方向？';
            } else {
                input.placeholder = '例如：我想系统学习机器学习，有 Python 基础但没学过数学...';
            }
        }

        function buildOpening() {
            if (isNodeMode) {
                return `我们来聊聊「${nodeName || '当前节点'}」，你目前对这个概念了解到什么程度？`;
            }
            if (isAppendMode) {
                return `你目前在学${pathName || '这条路径'}，想继续深化这条路径，还是拓展新方向？`;
            }
            return '你好！告诉我你想学什么，我们来规划你的专属学习路径 🗺️';
        }

        async function readFileText(file) {
            if (!file) return '';
            return await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(new Error('read failed'));
                reader.readAsText(file, 'utf-8');
            });
        }

        async function sendMessage() {
            let text = input.value.trim();
            if (!text && !pendingRecordFile && !pendingKnowledgeFile) return;
            if (!text && pendingRecordFile) text = '请分析我上传的学习记录';
            if (!text && pendingKnowledgeFile) text = '请分析我上传的知识库文档';
            addBubble('user', text);
            input.value = '';
            autoGrow();
            let prompt = text;
            if (isNodeMode && nodeName) prompt = `当前学习节点：${nodeName}\n${prompt}`;

            if (pendingRecordFile) {
                const file = pendingRecordFile;
                pendingRecordFile = null;
                document.getElementById('record-name').textContent = '';
                let fileText = '';
                try {
                    fileText = await readFileText(file);
                } catch (_) {
                    fileText = '';
                }
                const systemAppend = '分析以下学习记录，判断用户对各知识节点的掌握程度。在正常回复末尾，另起一行附加如下 JSON 块：\n```json\n{"updates":[{"node_id":"...","new_status":"mastered|learning|notStarted"}]}\n```';
                prompt = `${prompt}\n\n${systemAppend}\n\n学习记录文件名：${file.name}\n学习记录内容：\n${fileText}`;
                lastUserPrompt = prompt;
                const full = await requestAi(prompt, true);
                const parsed = extractJsonBlock(full);
                const updates = Array.isArray(parsed?.updates) ? parsed.updates : [];
                let okCount = 0;
                for (const item of updates) {
                    const body = {
                        node_id: (item.node_id || '').trim(),
                        new_status: (item.new_status || '').trim()
                    };
                    if (!body.node_id || !body.new_status) continue;
                    if (pathId) body.path_id = pathId;
                    const res = await fetch('/update_node_status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (res.ok) okCount += 1;
                }
                showToast(`✓ 已更新 ${okCount} 个节点状态`);
                await fetch('/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: todayDate(),
                        title: '上传学习记录并完成 AI 分析',
                        content: `文件：${file.name}`
                    })
                });
                return;
            }

            if (pendingKnowledgeFile) {
                const file = pendingKnowledgeFile;
                pendingKnowledgeFile = null;
                document.getElementById('knowledge-name').textContent = '';
                let fileText = '';
                try {
                    fileText = await readFileText(file);
                } catch (_) {
                    fileText = '';
                }
                const systemAppend = '从以下知识库文档提取 3-6 个适合作为学习节点的知识点。在正常回复末尾附加 JSON 块：\n```json\n{"suggestions":[{"label":"节点名","type":"prerequisite|core|advanced|optional","description":"一句话描述","reason":"推荐理由（15字内）"}]}\n```';
                prompt = `${prompt}\n\n${systemAppend}\n\n知识库文件名：${file.name}\n知识库内容：\n${fileText}`;
                lastUserPrompt = prompt;
                const before = chat.lastElementChild;
                const full = await requestAi(prompt, true);
                const parsed = extractJsonBlock(full);
                const suggestions = Array.isArray(parsed?.suggestions) ? parsed.suggestions : [];
                const latestAiRow = chat.lastElementChild && chat.lastElementChild !== before ? chat.lastElementChild : null;
                if (latestAiRow) renderSuggestionGroup(latestAiRow, suggestions);
                return;
            }

            lastUserPrompt = prompt;
            await requestAi(prompt, true);
        }

        function remapAndMerge(baseNodes, baseEdges, generated) {
            const used = new Set(baseNodes.map((n) => n.id));
            const idMap = {};
            const appendedNodes = [];
            (generated.nodes || []).forEach((n, idx) => {
                let nid = n.id || `n${baseNodes.length + idx + 1}`;
                while (used.has(nid)) {
                    nid = `n${baseNodes.length + appendedNodes.length + 1}`;
                }
                used.add(nid);
                idMap[n.id] = nid;
                appendedNodes.push({ ...n, id: nid });
            });
            const appendedEdges = (generated.edges || [])
                .map((e) => ({ from: idMap[e.from], to: idMap[e.to] }))
                .filter((e) => e.from && e.to);
            return {
                nodes: [...baseNodes, ...appendedNodes],
                edges: [...baseEdges, ...appendedEdges]
            };
        }

        async function generatePath() {
            genBtn.disabled = true;
            genBtn.textContent = '生成中...';
            try {
                const description = (lastUserPrompt || '请根据对话生成学习路径').slice(0, 4000);
                const genRes = await fetch('/generate_path', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description, path_id: pathId || undefined })
                });
                const generated = await genRes.json();
                if (!genRes.ok) return;
                if (!isAppendMode) {
                    const saveRes = await fetch('/save_path', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: generated.title || '学习路径',
                            nodes: generated.nodes || [],
                            edges: generated.edges || []
                        })
                    });
                    const saved = await saveRes.json();
                    if (saveRes.ok && saved.path_id) {
                        for (const node of pendingNodeAdds) {
                            await fetch('/save_path', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ path_id: saved.path_id, append_node: node })
                            });
                        }
                        window.location.href = `/map.html?path_id=${encodeURIComponent(saved.path_id)}`;
                    }
                } else {
                    const currentRes = await fetch(`/get_path/${encodeURIComponent(pathId)}`);
                    const current = currentRes.ok ? await currentRes.json() : { nodes: [], edges: [], title: pathName || '学习路径' };
                    const merged = remapAndMerge(current.nodes || [], current.edges || [], generated);
                    await fetch('/save_path', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            path_id: pathId,
                            title: current.title || generated.title || '学习路径',
                            nodes: merged.nodes,
                            edges: merged.edges
                        })
                    });
                    window.location.href = `/map.html?path_id=${encodeURIComponent(pathId)}`;
                }
            } finally {
                genBtn.disabled = false;
                genBtn.textContent = '生成节点图';
            }
        }

        async function init() {
            if (isAppendMode) {
                try {
                    const res = await fetch(`/get_path/${encodeURIComponent(pathId)}`);
                    if (res.ok) {
                        const data = await res.json();
                        pathName = data.title || '';
                        if (isNodeMode) {
                            const target = (data.nodes || []).find((n) => n.id === nodeId);
                            nodeName = target ? target.label : nodeId;
                        }
                    }
                } catch (_) {}
            }
            updateModeUI();
            showStaticAiBubble(buildOpening());
        }

        input.addEventListener('input', autoGrow);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('record-trigger').addEventListener('click', () => recordFile.click());
        document.getElementById('knowledge-trigger').addEventListener('click', () => knowledgeFile.click());
        recordFile.addEventListener('change', async (e) => {
            const f = e.target.files && e.target.files[0];
            if (!f) return;
            document.getElementById('record-name').textContent = `已选择：${f.name}`;
            pendingRecordFile = f;
            pendingKnowledgeFile = null;
            document.getElementById('knowledge-name').textContent = '';
        });
        knowledgeFile.addEventListener('change', async (e) => {
            const f = e.target.files && e.target.files[0];
            if (!f) return;
            document.getElementById('knowledge-name').textContent = `已选择：${f.name}`;
            pendingKnowledgeFile = f;
            pendingRecordFile = null;
            document.getElementById('record-name').textContent = '';
        });
        genBtn.addEventListener('click', generatePath);
        autoGrow();
        init();
    </script>
</body>
</html>
