<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规划你的学习路径</title>
    <link rel="stylesheet" href="/static/css/design-tokens.css">
    <style>
        :root {
            --bg-primary: #FAFAFA;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --brand-blue: #3B82F6;
            --brand-blue-dark: #1D4ED8;
            --brand-blue-light: #EFF6FF;
            --brand-blue-mid: #BFDBFE;
            --accent-yellow: #FBBF24;
            --accent-yellow-light: #FEF9C3;
            --border: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .shell {
            width: min(1100px, 94vw);
            margin: 20px auto;
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            height: calc(100vh - 40px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }
        .title {
            font-size: 32px;
            font-weight: 600;
            margin: 0;
        }
        .back {
            text-decoration: none;
            color: var(--brand-blue-dark);
            background: var(--brand-blue-light);
            border: 1px solid var(--brand-blue-mid);
            border-radius: 12px;
            padding: 8px 12px;
            transition: all 0.3s ease-in-out;
        }
        .back:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.2);
        }
        .chat {
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fff;
        }
        .bubble-row { display: flex; }
        .bubble-row.ai { justify-content: flex-start; }
        .bubble-row.user { justify-content: flex-end; }
        .bubble {
            max-width: 78%;
            border-radius: 16px;
            padding: 12px 14px;
            font-size: 16px;
            line-height: 1.6;
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            background: #fff;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .bubble.ai {
            background: #F3F4F6;
        }
        .bubble.user {
            background: var(--brand-blue-light);
            border-color: var(--brand-blue-mid);
            color: var(--brand-blue-dark);
        }
        .stream-skeleton {
            height: 18px;
            border-radius: 9999px;
            background: linear-gradient(90deg, #dbeafe, #bfdbfe, #dbeafe);
            background-size: 220% 100%;
            animation: sk 1.2s linear infinite;
        }
        .stream-cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: var(--brand-blue);
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: blink 1s infinite;
        }
        .stream-actions {
            margin-top: 8px;
            display: none;
            justify-content: flex-end;
            gap: 8px;
        }
        .stream-actions.show { display: flex; }
        .mini-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        .mini-btn:hover {
            color: var(--brand-blue-dark);
            background: var(--brand-blue-light);
            border-color: var(--brand-blue-mid);
        }
        .upload-zone {
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: #fff;
            padding: 14px 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .upload-card {
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 12px;
            transition: all 0.3s ease-in-out;
        }
        .upload-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }
        .upload-card.blue {
            border-color: var(--brand-blue-mid);
            background: var(--brand-blue-light);
        }
        .upload-card.yellow {
            border-color: var(--accent-yellow);
            background: var(--accent-yellow-light);
        }
        .upload-title {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 600;
        }
        .upload-tip {
            margin: 0 0 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .upload-file {
            width: 100%;
            font-size: 14px;
        }
        .composer {
            padding: 14px 18px;
            background: #fff;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: end;
        }
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px 12px;
            outline: none;
            resize: none;
            font-size: 16px;
            line-height: 1.6;
        }
        textarea:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,.16);
        }
        .send-btn {
            border: 1px solid var(--brand-blue);
            background: var(--brand-blue-light);
            color: var(--brand-blue-dark);
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.2);
        }
        .send-btn:active { transform: translateY(0); box-shadow: none; }
        .send-btn:disabled { opacity: .55; cursor: not-allowed; }
        .suggestions {
            padding: 0 18px 12px;
            background: #fff;
            display: grid;
            gap: 10px;
        }
        .suggestion-card {
            border: 1px dashed var(--brand-blue-mid);
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 12px;
            transition: all 0.3s ease-in-out;
        }
        .suggestion-card.added {
            border-style: dashed;
            border-color: var(--success);
            background: #ecfdf5;
        }
        .suggestion-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }
        .suggestion-desc {
            margin: 4px 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .suggestion-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }
        .gen-wrap {
            display: none;
            padding: 0 18px 18px;
            background: #fff;
            justify-content: flex-end;
        }
        .gen-btn {
            border: 1px solid var(--brand-blue);
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-dark));
            color: #fff;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        .gen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.2);
        }
        .gen-btn:active { transform: translateY(0); box-shadow: none; }
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease-in-out;
        }
        .reveal.show {
            opacity: 1;
            transform: translateY(0);
        }
        @keyframes blink {
            0%, 45% { opacity: 1; }
            55%, 100% { opacity: 0; }
        }
        @keyframes sk {
            from { background-position: 100% 0; }
            to { background-position: -100% 0; }
        }
        @media (max-width: 900px) {
            .shell {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }
            .title { font-size: 24px; }
            .upload-zone { grid-template-columns: 1fr; }
            .composer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="topbar reveal">
            <a href="/map" class="back">← 返回</a>
            <h1 class="title">规划你的学习路径</h1>
            <div style="width:56px;"></div>
        </header>

        <section id="chat-area" class="chat"></section>

        <section class="upload-zone reveal">
            <article class="upload-card blue">
                <h3 class="upload-title">📓 学习记录</h3>
                <p class="upload-tip">分析已掌握能力并更新节点状态</p>
                <input id="record-file" class="upload-file" type="file" accept=".txt,.md,.json,.csv,.log,.pdf">
            </article>
            <article class="upload-card yellow">
                <h3 class="upload-title">📚 知识库</h3>
                <p class="upload-tip">从资料中推荐新学习节点</p>
                <input id="knowledge-file" class="upload-file" type="file" accept=".txt,.md,.json,.csv,.log,.pdf">
            </article>
        </section>

        <section id="suggestions" class="suggestions"></section>

        <section class="composer reveal">
            <textarea id="input-box" rows="3" placeholder="输入学习目标或当前状态，按 Enter 发送（Shift+Enter 换行）"></textarea>
            <button id="send-btn" class="send-btn">发送</button>
        </section>
        <div id="gen-wrap" class="gen-wrap">
            <button id="generate-btn" class="gen-btn">生成节点图</button>
        </div>
    </main>

    <script>
        const pathId = "{{ path_id }}";
        const chatArea = document.getElementById('chat-area');
        const sendBtn = document.getElementById('send-btn');
        const inputBox = document.getElementById('input-box');
        const recordFile = document.getElementById('record-file');
        const knowledgeFile = document.getElementById('knowledge-file');
        const suggestionsWrap = document.getElementById('suggestions');
        const genWrap = document.getElementById('gen-wrap');
        const generateBtn = document.getElementById('generate-btn');
        let lastUserPrompt = '';
        let pendingNodes = [];

        function revealPage() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('show');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.12 });
            document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
        }

        function addBubble(role, text = '') {
            const row = document.createElement('div');
            row.className = `bubble-row ${role}`;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;
            bubble.textContent = text;
            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
            return bubble;
        }

        function parseFirstJsonObject(text) {
            if (!text) return null;
            const direct = text.trim();
            try {
                return JSON.parse(direct);
            } catch (_) {}
            const start = direct.indexOf('{');
            const end = direct.lastIndexOf('}');
            if (start === -1 || end === -1 || end <= start) return null;
            const slice = direct.slice(start, end + 1);
            try {
                return JSON.parse(slice);
            } catch (_) {
                return null;
            }
        }

        async function streamPrompt(prompt, opts = {}) {
            const bubble = addBubble('ai', '');
            bubble.innerHTML = `
                <div class="stream-skeleton"></div>
                <span class="stream-text"></span><span class="stream-cursor"></span>
                <div class="stream-actions">
                    <button class="mini-btn">复制</button>
                    <button class="mini-btn">重新生成</button>
                </div>
            `;
            const textEl = bubble.querySelector('.stream-text');
            const skeletonEl = bubble.querySelector('.stream-skeleton');
            const cursorEl = bubble.querySelector('.stream-cursor');
            const actionsEl = bubble.querySelector('.stream-actions');
            const copyBtn = actionsEl.querySelector('.mini-btn:nth-child(1)');
            const regenBtn = actionsEl.querySelector('.mini-btn:nth-child(2)');

            sendBtn.disabled = true;
            sendBtn.innerText = '生成中...';

            const res = await fetch('/chat_stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: prompt})
            });
            if (!res.ok || !res.body) {
                bubble.textContent = '请求失败，请稍后重试。';
                sendBtn.disabled = false;
                sendBtn.innerText = '发送';
                return '';
            }
            const reader = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let all = '';
            let buffer = '';
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split('\n\n');
                buffer = events.pop() || '';
                for (const evt of events) {
                    const lines = evt.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        if (skeletonEl && skeletonEl.style.display !== 'none') skeletonEl.style.display = 'none';
                        all += data;
                        textEl.textContent = all;
                        chatArea.scrollTop = chatArea.scrollHeight;
                    }
                }
            }
            if (cursorEl) cursorEl.style.display = 'none';
            actionsEl.classList.add('show');
            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(all);
                    copyBtn.innerText = '已复制';
                    setTimeout(() => copyBtn.innerText = '复制', 1000);
                } catch (_) {}
            });
            regenBtn.addEventListener('click', async () => {
                await streamPrompt(lastUserPrompt || prompt, opts);
            });

            sendBtn.disabled = false;
            sendBtn.innerText = '发送';
            genWrap.style.display = 'flex';
            return all;
        }

        async function updateNodeStatuses(pathIdValue, updates) {
            if (!pathIdValue || !Array.isArray(updates)) return;
            for (const item of updates) {
                const nodeId = (item.node_id || '').trim();
                const status = (item.new_status || '').trim();
                if (!nodeId || !status) continue;
                await fetch('/update_node_status', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path_id: pathIdValue, node_id: nodeId, new_status: status})
                });
            }
        }

        function renderSuggestions(cards) {
            suggestionsWrap.innerHTML = '';
            if (!Array.isArray(cards) || cards.length === 0) return;
            cards.forEach((item, idx) => {
                const card = document.createElement('article');
                card.className = 'suggestion-card';
                card.innerHTML = `
                    <h4 class="suggestion-title">${item.label || '未命名节点'}</h4>
                    <p class="suggestion-desc">${item.description || ''}</p>
                    <p class="suggestion-desc">推荐理由：${item.reason || ''}</p>
                    <div class="suggestion-actions">
                        <button class="mini-btn add-btn">添加到路径</button>
                        <button class="mini-btn skip-btn">跳过</button>
                    </div>
                `;
                const addBtn = card.querySelector('.add-btn');
                const skipBtn = card.querySelector('.skip-btn');
                addBtn.addEventListener('click', async () => {
                    const node = {
                        id: `s${Date.now()}_${idx}`,
                        label: item.label || '新增节点',
                        type: item.type || 'optional',
                        status: 'notStarted',
                        needsAssessment: true,
                        description: item.description || ''
                    };
                    if (pathId) {
                        const r = await fetch('/save_path', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({path_id: pathId, append_node: node})
                        });
                        if (!r.ok) {
                            addBtn.innerText = '添加失败';
                            return;
                        }
                    } else {
                        pendingNodes.push(node);
                    }
                    card.classList.add('added');
                    addBtn.disabled = true;
                    addBtn.innerText = pathId ? '已添加到路径' : '新增待连接';
                });
                skipBtn.addEventListener('click', () => {
                    card.remove();
                });
                suggestionsWrap.appendChild(card);
            });
        }

        async function readFileAsText(file) {
            if (!file) return '';
            return await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(new Error('读取文件失败'));
                reader.readAsText(file, 'utf-8');
            });
        }

        async function sendUserPrompt() {
            const text = inputBox.value.trim();
            if (!text) return;
            addBubble('user', text);
            inputBox.value = '';
            lastUserPrompt = text;
            await streamPrompt(text);
        }

        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendUserPrompt();
            }
        });
        sendBtn.addEventListener('click', sendUserPrompt);

        recordFile.addEventListener('change', async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const content = await readFileAsText(file);
            const prompt = `以下是用户的学习记录，请分析其中体现的掌握情况，告诉用户哪些知识点已掌握，哪些还需加强，并以 JSON 附在回复末尾：{"updates":[{"node_id":"...","new_status":"mastered|learning"}]}\n\n学习记录内容：\n${content}`;
            lastUserPrompt = prompt;
            const all = await streamPrompt(prompt);
            const parsed = parseFirstJsonObject(all);
            if (parsed && Array.isArray(parsed.updates)) {
                await updateNodeStatuses(pathId, parsed.updates);
            }
        });

        knowledgeFile.addEventListener('change', async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const content = await readFileAsText(file);
            const prompt = `以下是用户上传的参考资料，请从中提取3-6个有价值的学习节点，以 JSON 格式附在回复末尾：{"suggestions":[{"label":"...","type":"prerequisite|core|advanced|optional","description":"...","reason":"..."}]}\n\n资料内容：\n${content}`;
            lastUserPrompt = prompt;
            const all = await streamPrompt(prompt);
            const parsed = parseFirstJsonObject(all);
            if (parsed && Array.isArray(parsed.suggestions)) {
                renderSuggestions(parsed.suggestions);
            }
        });

        generateBtn.addEventListener('click', async () => {
            const description = (lastUserPrompt || "请基于当前对话生成学习路径").slice(0, 3000);
            generateBtn.disabled = true;
            generateBtn.innerText = '生成中...';
            try {
                const genRes = await fetch('/generate_path', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({description})
                });
                const generated = await genRes.json();
                if (!genRes.ok) {
                    addBubble('ai', '路径生成失败，请稍后重试。');
                    return;
                }

                if (pathId) {
                    const currentRes = await fetch(`/get_path/${encodeURIComponent(pathId)}`);
                    const current = currentRes.ok ? await currentRes.json() : null;
                    const baseNodes = (current && Array.isArray(current.nodes)) ? current.nodes : [];
                    const baseEdges = (current && Array.isArray(current.edges)) ? current.edges : [];
                    const used = new Set(baseNodes.map((n) => n.id));
                    const mappedNodes = [];
                    const idMap = {};
                    generated.nodes.forEach((node, idx) => {
                        let nid = node.id || `n${baseNodes.length + idx + 1}`;
                        while (used.has(nid)) {
                            nid = `n${baseNodes.length + mappedNodes.length + 1}`;
                        }
                        used.add(nid);
                        idMap[node.id] = nid;
                        mappedNodes.push({...node, id: nid});
                    });
                    const mappedEdges = (generated.edges || [])
                        .map((e) => ({from: idMap[e.from], to: idMap[e.to]}))
                        .filter((e) => e.from && e.to);
                    const mergedNodes = [...baseNodes, ...mappedNodes, ...pendingNodes];
                    const mergedEdges = [...baseEdges, ...mappedEdges];
                    await fetch('/save_path', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            path_id: pathId,
                            title: current?.title || generated.title || "学习路径",
                            nodes: mergedNodes,
                            edges: mergedEdges
                        })
                    });
                    window.location.href = `/map?path_id=${encodeURIComponent(pathId)}`;
                } else {
                    const saveRes = await fetch('/save_path', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            title: generated.title || "学习路径",
                            nodes: generated.nodes || [],
                            edges: generated.edges || []
                        })
                    });
                    const saved = await saveRes.json();
                    if (!saveRes.ok || !saved.path_id) {
                        addBubble('ai', '路径保存失败，请稍后重试。');
                        return;
                    }
                    const newPathId = saved.path_id;
                    for (const node of pendingNodes) {
                        await fetch('/save_path', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({path_id: newPathId, append_node: node})
                        });
                    }
                    window.location.href = `/map?path_id=${encodeURIComponent(newPathId)}`;
                }
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = '生成节点图';
            }
        });

        addBubble('ai', '你好！告诉我你想学什么，或者描述你目前的状态，我来帮你规划学习路径 🗺️');
        revealPage();
    </script>
</body>
</html>
